<!DOCTYPE html>
<html>

<head>

<title>Activities</title>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<link
rel="stylesheet"
href="styles.css">

<style>

.container{
max-width:900px;
margin:auto;
padding:20px;
}

h2{
text-align:center;
margin-bottom:30px;
}

.section{

margin-top:28px;

background:white;

padding:24px;

border-radius:18px;

box-shadow:
0 4px 12px
rgba(0,0,0,.06);

}

#nextCallBox{

margin-top:18px;

text-align:center;

}

.activities{

text-align:center;

font-size:22px;

padding:20px;

}

.notice{

margin-top:20px;

background:#f7fbff;

padding:20px;

border-radius:14px;

line-height:1.8;

}

</style>

</head>

<body>

<div id="header"></div>

<div class="container">

<h2>

Activities & Support

</h2>

<!-- NEXT CALL -->

<div class="section">

<h3>

We look forward to speaking with you

</h3>

<div id="nextCallBox">

Loading next scheduled call...

</div>

<div class="notice">

We will identify ourselves as
<b>Shine Circle</b>.

<br><br>

We will never request money
or ask to meet in person.

</div>

</div>

<!-- ACTIVITIES -->

<div class="section">

<h3>

Activities

</h3>

<div class="activities">

Coming soon 🌿

</div>

</div>

</div>

<script>

// HEADER

fetch('/header')

.then(r=>r.text())

.then(html=>{

document
.getElementById(
'header'
)

.innerHTML=

html;

document
.getElementById(
'headerButtons'
)

.innerHTML=

`

<button
class="btn"
onclick="goHome()">

Home

</button>

<button
class="btn"
onclick="goSettings()">

Settings

</button>

<button
class="btn"
onclick="logout()">

Logout

</button>

`;

});

// LOAD CALL

loadNextCall();

async function loadNextCall(){

try{

const response=

await fetch(
'/api/next-call'
);

const data=

await response.json();

if(
!data.id
){

document
.getElementById(
'nextCallBox'
)

.innerHTML=

`
No scheduled calls yet.
`;

return;

}

const date=

new Date(
data.calldate
)

.toLocaleDateString(

'en-US',

{

weekday:'long',

month:'long',

day:'numeric',

year:'numeric'

}

);

document
.getElementById(
'nextCallBox'
)

.innerHTML=

`

<div style="
font-size:26px;
font-weight:800;
color:#1E6FDB;
">

${date}

</div>

<div style="
font-size:20px;
margin-top:12px;
">

${data.starttime}

—

${data.endtime}

${data.timezone}

</div>

`;

}

catch(err){

console.log(err);

}

}

function goHome(){

window.location=
'/home';

}

function goSettings(){

window.location=
'/settings';

}

function logout(){

fetch('/logout')

.then(()=>{

window.location=
'/login';

});

}

</script>

</body>

</html>
