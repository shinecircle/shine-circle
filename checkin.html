<!DOCTYPE html>
<html>
<head>
  <title>Check-In | Shine Circle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="header">
  <img src="logo.jpg" class="logo">
  <button class="btn" onclick="goHome()">Home</button>
</div>

<div class="container">

  <h2>Daily Check-In</h2>

  <!-- MOOD -->
  <h3>How are you feeling?</h3>
  <select id="mood">
    <option>Good</option>
    <option>Okay</option>
    <option>Not Great</option>
  </select>

  <button class="btn" onclick="saveMood()">Save Mood</button>

  <hr>

  <!-- MEDICATION -->
  <h3>Medication</h3>

  <input id="medName" placeholder="Medicine Name">

  <select id="medTime">
    <option>Morning</option>
    <option>Midday</option>
    <option>Evening</option>
  </select>

  <select id="medTaken">
    <option>Yes</option>
    <option>No</option>
  </select>

  <button class="btn" onclick="saveMedication()">Save Medication</button>

  <hr>

  <!-- CALL TRACKING -->
  <h3>Phone Call</h3>

  <input id="callWith" placeholder="Who did you talk to?">

  <button class="btn" onclick="startCall()">Start Call</button>
  <button class="btn" onclick="endCall()">End Call</button>

</div>

<script>
function goHome(){
  window.location = 'home.html';
}

// ===================
// MOOD
// ===================
function saveMood(){

  fetch('/checkin',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      mood: document.getElementById("mood").value
    })
  });

  alert("Mood saved!");
}

// ===================
// MEDICATION
// ===================
function saveMedication(){

  fetch('/medication',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      medicineName: document.getElementById("medName").value,
      timeOfDay: document.getElementById("medTime").value,
      taken: document.getElementById("medTaken").value
    })
  });

  alert("Medication saved!");
}

// ===================
// CALL TRACKING
// ===================
let startTime;

function startCall(){
  startTime = new Date();
  alert("Call started");
}

function endCall(){

  fetch('/call',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      callWith: document.getElementById("callWith").value,
      startTime,
      endTime: new Date()
    })
  });

  alert("Call logged");
}
</script>

</body>
</html>
