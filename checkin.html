<!DOCTYPE html>
<html>
<head>

  <title>Daily Check-In</title>

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles.css">

  <style>

    body{
      font-family:Arial, sans-serif;
      margin:0;
      padding:0;
      background:#F7F9FC;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 20px;
      background:white;
      box-shadow:0 2px 6px rgba(0,0,0,.08);
    }

    .logo{
      height:60px;
    }

    .btn{
      background:#1E6FDB;
      color:white;
      border:none;
      padding:10px 16px;
      border-radius:8px;
      cursor:pointer;
      margin-left:6px;
      font-size:14px;
    }

    .btn:hover{
      opacity:.92;
    }

    .container{
      max-width:700px;
      margin:auto;
      padding:20px;
      text-align:center;
    }

    h2{
      margin-top:10px;
      color:#1B1B1B;
    }

    .date{
      color:#555;
      margin-bottom:8px;
      font-size:17px;
    }

    .status{
      margin-bottom:20px;
      font-weight:bold;
      min-height:22px;
    }

    .status-success{
      color:green;
    }

    .status-error{
      color:red;
    }

    .panel{
      margin:25px auto;
      padding:25px;
      border-radius:14px;
      box-shadow:0 3px 8px rgba(0,0,0,.06);
    }

    .mood-panel{
      background:#E8F0FE;
    }

    .meds-panel{
      background:#E8F8F5;
    }

    .panel h3{
      margin-top:0;
      margin-bottom:18px;
      color:#222;
    }

    .btn-group{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:10px;
    }

    .btn-group button{

      padding:14px 18px;

      border:none;

      border-radius:10px;

      background:#1E6FDB;

      color:white;

      cursor:pointer;

      font-size:16px;

      transition:.2s;

      min-width:120px;
    }

    /* user clicked */
    .selected{
      outline:4px solid #0B2A5B;
      transform:scale(1.03);
    }

    /* successfully saved to postgres */
    .saved{
      background:#1E8E3E !important;
      color:white;
    }

    .save-btn{
      margin-top:20px;
      padding:12px 22px;
      font-size:15px;
    }

    @media(max-width:600px){

      .btn-group button{
        width:100%;
      }

      .header{
        flex-direction:column;
        gap:10px;
      }

    }

  </style>

</head>

<body>

<!-- HEADER -->
<div class="header">

  <img src="logo.jpg" class="logo">

  <div>

    <button class="btn"
            onclick="goHome()">
      Home
    </button>

    <button class="btn"
            onclick="goActivities()">
      Activities
    </button>

    <button class="btn"
            onclick="logout()">
      Logout
    </button>

  </div>

</div>

<!-- CONTENT -->
<div class="container">

  <h2>Daily Check-In</h2>

  <div id="today"
       class="date"></div>

  <div id="status"
       class="status"></div>

  <!-- MOOD -->
  <div class="panel mood-panel">

    <h3>How are you feeling today?</h3>

    <div id="moodBtns"
         class="btn-group">

      <button onclick="selectMood(this)">
        Great
      </button>

      <button onclick="selectMood(this)">
        Good
      </button>

      <button onclick="selectMood(this)">
        Low
      </button>

      <button onclick="selectMood(this)">
        Struggling
      </button>

    </div>

    <button class="btn save-btn"
            onclick="submitMood()">
      Save Mood
    </button>

  </div>

  <!-- MEDS -->
  <div class="panel meds-panel">

    <h3>Did you take your medicine today?</h3>

    <div id="medBtns"
         class="btn-group">

      <button onclick="selectMeds(this)">
        Yes
      </button>

      <button onclick="selectMeds(this)">
        No
      </button>

    </div>

    <button class="btn save-btn"
            onclick="submitMeds()">
      Save Medication
    </button>

  </div>

</div>

<script>

// =========================
// GLOBALS
// =========================
let selectedMood = "";
let selectedMeds = "";

// =========================
// DATE
// =========================
document.getElementById("today").innerText =

  new Date().toLocaleDateString(

    'en-US',

    {

      weekday:'long',

      year:'numeric',

      month:'long',

      day:'numeric'

    }

  );

// =========================
// LOAD SAVED DATA
// =========================
loadTodayCheckin();

async function loadTodayCheckin(){

  try{

    const response =
      await fetch('/api/checkin-today');

    const data =
      await response.json();

    console.log("LOADED CHECKIN:");
    console.log(data);

    if(!data.checkedIn){
      return;
    }

    // restore globals
    selectedMood =
      data.mood || "";

    selectedMeds =
      data.meds || "";

    // status message
    document.getElementById("status").innerText =
      "Today's check-in already saved";

    document.getElementById("status").className =
      "status status-success";

    // restore button states
    restoreSavedSelections();

  }

  catch(err){

    console.log(err);

    document.getElementById("status").innerText =
      "Could not load today's check-in";

    document.getElementById("status").className =
      "status status-error";

  }

}

// =========================
// CLEAR SELECTIONS
// =========================
function clearGroup(groupId){

  document.querySelectorAll(`#${groupId} button`)
    .forEach(btn=>{

      btn.classList.remove("selected");

    });

}

// =========================
// MOOD SELECT
// =========================
function selectMood(btn){

  selectedMood =
    btn.innerText.trim();

  clearGroup("moodBtns");

  btn.classList.add("selected");

}

// =========================
// MEDS SELECT
// =========================
function selectMeds(btn){

  selectedMeds =
    btn.innerText.trim();

  clearGroup("medBtns");

  btn.classList.add("selected");

}

// =========================
// RESTORE SAVED STATES
// =========================
function restoreSavedSelections(){

  // MOOD
  document.querySelectorAll("#moodBtns button")
    .forEach(btn=>{

      if(btn.innerText.trim() === selectedMood){

        btn.classList.add("saved");

      }

    });

  // MEDS
  document.querySelectorAll("#medBtns button")
    .forEach(btn=>{

      if(btn.innerText.trim() === selectedMeds){

        btn.classList.add("saved");

      }

    });

}

// =========================
// SAVE MOOD
// =========================
async function submitMood(){

  if(!selectedMood){

    alert("Please select a mood");

    return;
  }

  try{

    const response = await fetch('/api/checkin',{

      method:'POST',

      headers:{
        'Content-Type':'application/json'
      },

      body:JSON.stringify({

        mood:selectedMood

      })

    });

    const data =
      await response.json();

    console.log("SAVE MOOD RESPONSE:");
    console.log(data);

    // FAILED
    if(!response.ok || !data.success){

      throw new Error(
        data.error || "Save failed"
      );

    }

    // SUCCESS
    document.getElementById("status").innerText =
      "Mood saved successfully";

    document.getElementById("status").className =
      "status status-success";

    // clear old saved
    document.querySelectorAll("#moodBtns button")
      .forEach(btn=>{

        btn.classList.remove("saved");

      });

    // mark saved
    document.querySelectorAll("#moodBtns button")
      .forEach(btn=>{

        if(btn.innerText.trim() === selectedMood){

          btn.classList.add("saved");

        }

      });

  }

  catch(err){

    console.log(err);

    document.getElementById("status").innerText =
      "Error saving mood: " + err.message;

    document.getElementById("status").className =
      "status status-error";

  }

}

// =========================
// SAVE MEDS
// =========================
async function submitMeds(){

  if(!selectedMeds){

    alert("Please select Yes or No");

    return;
  }

  try{

    const response = await fetch('/api/checkin',{

      method:'POST',

      headers:{
        'Content-Type':'application/json'
      },

      body:JSON.stringify({

        meds:selectedMeds

      })

    });

    const data =
      await response.json();

    console.log("SAVE MEDS RESPONSE:");
    console.log(data);

    // FAILED
    if(!response.ok || !data.success){

      throw new Error(
        data.error || "Save failed"
      );

    }

    // SUCCESS
    document.getElementById("status").innerText =
      "Medication saved successfully";

    document.getElementById("status").className =
      "status status-success";

    // clear old saved
    document.querySelectorAll("#medBtns button")
      .forEach(btn=>{

        btn.classList.remove("saved");

      });

    // mark saved
    document.querySelectorAll("#medBtns button")
      .forEach(btn=>{

        if(btn.innerText.trim() === selectedMeds){

          btn.classList.add("saved");

        }

      });

  }

  catch(err){

    console.log(err);

    document.getElementById("status").innerText =
      "Error saving medication: " + err.message;

    document.getElementById("status").className =
      "status status-error";

  }

}

// =========================
// NAVIGATION
// =========================
function goHome(){

  window.location='/home';

}

function goActivities(){

  window.location='/activities';

}

function logout(){

  fetch('/logout')
    .then(()=>{

      window.location='/';

    });

}

</script>

</body>
</html>
