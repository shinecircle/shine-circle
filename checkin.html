<!DOCTYPE html>
<html>
<head>
<title>Daily Check-In</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h2>Daily Check-In</h2>

<div>
<button onclick="setMood('Great')">Great</button>
<button onclick="setMood('Good')">Good</button>
<button onclick="setMood('Low')">Low</button>
<button onclick="setMood('Struggling')">Struggling</button>
</div>

<br>

<div>
<button onclick="setMeds('Yes')">Yes</button>
<button onclick="setMeds('No')">No</button>
</div>

<br>

<button onclick="submit()">Submit</button>

<p id="msg"></p>

<script>

let mood="";
let meds="";

function setMood(m){ mood=m; }
function setMeds(m){ meds=m; }

function submit(){

  fetch('/checkin',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ mood, meds })
  })
  .then(r=>r.json())
  .then(()=>{
    document.getElementById("msg").innerText="Saved";
    load();
  });
}

function load(){

  fetch('/checkin-today')
  .then(r=>r.json())
  .then(d=>{
    if(d.checkedIn){
      document.getElementById("msg").innerText =
        "Today: " + d.mood + " / " + d.meds;
    }
  });
}

load();

</script>

</body>
</html>
