<!DOCTYPE html>
<html>

<head>

  <title>Daily Check-In</title>

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles.css">

  <style>

    .page {

      max-width:800px;
      margin:auto;
      padding:24px 18px;

    }

    .today {

      text-align:center;

      font-size:26px;

      margin-bottom:34px;

      color:#444;

      font-weight:bold;

      line-height:1.4;

    }

    .panel {

      padding:28px;

      border-radius:18px;

      margin-bottom:34px;

      box-shadow:0 6px 18px rgba(0,0,0,0.06);

    }

    .mood-panel {

      background:#eef6ff;

    }

    .med-panel {

      background:#fff7e6;

    }

    .panel h2 {

      text-align:center;

      margin-bottom:24px;

      font-size:30px;

      line-height:1.3;

    }

    .btn-group {

      display:flex;

      justify-content:center;

      flex-wrap:wrap;

      gap:14px;

    }

    .choice-btn {

      padding:16px 22px;

      border:none;

      border-radius:14px;

      background:#d9d9d9;

      cursor:pointer;

      font-size:18px;

      font-weight:600;

      transition:0.2s ease;

    }

    .choice-btn:hover {

      transform:translateY(-1px);

    }

    .choice-btn.selected {

      background:#1E6FDB;
      color:white;

    }

    .save-btn {

      display:block;

      margin:28px auto 0 auto;

      width:260px;

    }

    .status {

      text-align:center;

      margin-top:18px;

      color:green;

      font-weight:bold;

      font-size:17px;

    }

    @media (max-width:600px){

      .page {

        padding:18px 14px;

      }

      .today {

        font-size:22px;

      }

      .panel {

        padding:22px 18px;

      }

      .panel h2 {

        font-size:24px;

      }

      .choice-btn {

        width:100%;

        font-size:18px;

        padding:18px;

      }

      .save-btn {

        width:100%;

      }

    }

  </style>

</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<div class="page">

  <!-- DATE -->
  <div class="today" id="today"></div>

  <!-- MOOD -->
  <div class="panel mood-panel">

    <h2>How are you feeling today?</h2>

    <div class="btn-group" id="moodBtns">

      <button class="choice-btn">Great</button>
      <button class="choice-btn">Good</button>
      <button class="choice-btn">Low</button>
      <button class="choice-btn">Struggling</button>

    </div>

    <button class="btn save-btn"
            onclick="saveMood()">

      Save Mood

    </button>

    <div class="status"
         id="moodStatus"></div>

  </div>

  <!-- MEDICATION -->
  <div class="panel med-panel">

    <h2>Did you take your medication today?</h2>

    <div class="btn-group" id="medBtns">

      <button class="choice-btn">Yes</button>
      <button class="choice-btn">No</button>

    </div>

    <button class="btn save-btn"
            onclick="saveMeds()">

      Save Medication

    </button>

    <div class="status"
         id="medStatus"></div>

  </div>

</div>

<script>

// =========================
// LOAD HEADER
// =========================
fetch('/header')

.then(r=>r.text())

.then(html=>{

  document.getElementById('header')
    .innerHTML = html;

  const buttons =
    document.getElementById("headerButtons");

  if(buttons){

    buttons.innerHTML = `

      <button class="btn btn-light"
              onclick="goHome()">

        Home

      </button>

      <button class="btn btn-light"
              onclick="goActivities()">

        Activities

      </button>

      <button class="btn"
              onclick="logout()">

        Logout

      </button>

    `;

  }

});

// =========================
// DATE
// =========================
document.getElementById("today").innerText =
  new Date().toLocaleDateString(
    'en-US',
    {
      weekday:'long',
      year:'numeric',
      month:'long',
      day:'numeric'
    }
  );

// =========================
// STATE
// =========================
let selectedMood = "";
let selectedMeds = "";

// =========================
// BUTTON REFERENCES
// =========================
const moodButtons =
  document.querySelectorAll("#moodBtns .choice-btn");

const medButtons =
  document.querySelectorAll("#medBtns .choice-btn");

// =========================
// MOOD CLICK
// =========================
moodButtons.forEach(btn => {

  btn.onclick = function(){

    selectedMood = btn.innerText;

    moodButtons.forEach(b=>{
      b.classList.remove('selected');
    });

    btn.classList.add('selected');

  };

});

// =========================
// MED CLICK
// =========================
medButtons.forEach(btn => {

  btn.onclick = function(){

    selectedMeds = btn.innerText;

    medButtons.forEach(b=>{
      b.classList.remove('selected');
    });

    btn.classList.add('selected');

  };

});

// =========================
// LOAD SAVED VALUES
// =========================
fetch('/api/checkin-today')

.then(r=>r.json())

.then(data=>{

  console.log("Loaded data:", data);

  if(!data.checkedIn) return;

  // RESTORE MOOD
  if(data.mood){

    selectedMood = data.mood;

    moodButtons.forEach(btn=>{

      if(btn.innerText === data.mood){

        btn.classList.add('selected');

      }

    });

    document.getElementById("moodStatus")
      .innerText = "Mood already saved today";

  }

  // RESTORE MEDS
  if(data.meds){

    selectedMeds = data.meds;

    medButtons.forEach(btn=>{

      if(btn.innerText === data.meds){

        btn.classList.add('selected');

      }

    });

    document.getElementById("medStatus")
      .innerText = "Medication already saved today";

  }

})

.catch(err=>{

  console.log("LOAD ERROR:", err);

});

// =========================
// SAVE MOOD
// =========================
function saveMood(){

  if(!selectedMood){

    alert("Please select a mood.");
    return;

  }

  fetch('/api/checkin', {

    method:'POST',

    headers:{
      'Content-Type':'application/json'
    },

    body:JSON.stringify({
      mood:selectedMood
    })

  })

  .then(r => r.json())

  .then(data => {

    console.log("Mood response:", data);

    if(data.success){

      document.getElementById("moodStatus")
        .innerText = "Mood saved successfully";

    } else {

      document.getElementById("moodStatus")
        .innerText = "Database save failed";

    }

  })

  .catch(err => {

    console.log(err);

    document.getElementById("moodStatus")
      .innerText = "Server error saving mood";

  });

}

// =========================
// SAVE MEDS
// =========================
function saveMeds(){

  if(!selectedMeds){

    alert("Please choose Yes or No.");
    return;

  }

  fetch('/api/checkin', {

    method:'POST',

    headers:{
      'Content-Type':'application/json'
    },

    body:JSON.stringify({
      meds:selectedMeds
    })

  })

  .then(r => r.json())

  .then(data => {

    console.log("Medication response:", data);

    if(data.success){

      document.getElementById("medStatus")
        .innerText = "Medication saved successfully";

    } else {

      document.getElementById("medStatus")
        .innerText = "Database save failed";

    }

  })

  .catch(err => {

    console.log(err);

    document.getElementById("medStatus")
      .innerText = "Server error saving medication";

  });

}

// =========================
// NAV
// =========================
function goHome(){

  window.location='/home';

}

function goActivities(){

  window.location='/activities';

}

function logout(){

  fetch('/logout')
  .then(()=>{
    window.location='/login';
  });

}

</script>

</body>
</html>
