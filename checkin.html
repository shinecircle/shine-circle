<!DOCTYPE html>
<html>
<head>
  <title>Daily Check-In</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">

  <style>
    .panel {
      margin:20px auto;
      padding:20px;
      border-radius:12px;
      max-width:500px;
    }

    .mood-panel { background:#E8F0FE; }
    .meds-panel { background:#E8F8F5; }

    .btn-group button{
      margin:5px;
      padding:12px;
      border-radius:8px;
      border:none;
      background:#1E6FDB;
      color:white;
      cursor:pointer;
    }

    .selected { background:#0B2A5B; }
    .disabled { background:#ccc !important; cursor:not-allowed; }
  </style>
</head>

<body>

<div class="header">
  <img src="logo.jpg" class="logo">
  <div>
    <button class="btn" onclick="goHome()">Home</button>
    <button class="btn" onclick="goActivities()">Activities</button>
    <button class="btn" onclick="logout()">Logout</button>
  </div>
</div>

<div style="text-align:center;padding:20px;">

  <h2>Daily Check-In</h2>
  <p id="today"></p>

  <!-- MOOD PANEL -->
  <div class="panel mood-panel">
    <h3>How are you feeling today?</h3>

    <div id="moodBtns" class="btn-group">
      <button onclick="selectMood(this)">Great</button>
      <button onclick="selectMood(this)">Good</button>
      <button onclick="selectMood(this)">Low</button>
      <button onclick="selectMood(this)">Struggling</button>
    </div>

    <br>
    <button id="moodSubmit" class="btn" onclick="submitMood()">Save Mood</button>
  </div>

  <!-- MEDS PANEL -->
  <div class="panel meds-panel">
    <h3>Did you take your medicine today?</h3>

    <div id="medBtns" class="btn-group">
      <button onclick="selectMeds(this)">Yes</button>
      <button onclick="selectMeds(this)">No</button>
    </div>

    <br>
    <button id="medSubmit" class="btn" onclick="submitMeds()">Save Medication</button>
  </div>

  <p id="msg"></p>

</div>

<script>

let selectedMood="";
let selectedMeds="";

// DATE
document.getElementById("today").innerText =
  "Today is: " + new Date().toLocaleDateString();

// LOAD EXISTING
fetch('/checkin-today')
.then(r=>r.json())
.then(d=>{
  if(d.checkedIn){
    selectedMood = d.mood || "";
    selectedMeds = d.meds || "";

    highlight();
    disableIfSaved();
  }
});

// SELECT
function selectMood(btn){
  selectedMood = btn.innerText;
  document.querySelectorAll("#moodBtns button")
    .forEach(b=>b.classList.remove("selected"));
  btn.classList.add("selected");
}

function selectMeds(btn){
  selectedMeds = btn.innerText;
  document.querySelectorAll("#medBtns button")
    .forEach(b=>b.classList.remove("selected"));
  btn.classList.add("selected");
}

// SAVE MOOD ONLY
function submitMood(){

  if(!selectedMood){
    document.getElementById("msg").innerText="Select a mood first";
    return;
  }

  fetch('/checkin',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      mood:selectedMood,
      meds:selectedMeds
    })
  })
  .then(()=> {
    document.getElementById("msg").innerText="Mood saved!";
  });
}

// SAVE MEDS ONLY
function submitMeds(){

  fetch('/checkin',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      mood:selectedMood,
      meds:selectedMeds
    })
  })
  .then(()=> {
    document.getElementById("msg").innerText="Medication saved!";
  });
}

// UI HELPERS
function highlight(){
  document.querySelectorAll("#moodBtns button")
    .forEach(b=>{ if(b.innerText===selectedMood) b.classList.add("selected"); });

  document.querySelectorAll("#medBtns button")
    .forEach(b=>{ if(b.innerText===selectedMeds) b.classList.add("selected"); });
}

function disableIfSaved(){
  document.getElementById("moodSubmit").innerText="Saved";
  document.getElementById("medSubmit").innerText="Saved";
}

// NAV
function goHome(){ window.location='/home'; }
function goActivities(){ window.location='/activities'; }
function logout(){ fetch('/logout').then(()=>window.location='/'); }

</script>

</body>
</html>
