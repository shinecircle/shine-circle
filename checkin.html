<!DOCTYPE html>
<html>

<head>

  <title>Daily Check-In</title>

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles.css">

  <style>

    .page {
      max-width:800px;
      margin:auto;
      padding:20px;
    }

    .today {
      text-align:center;
      font-size:22px;
      margin-bottom:30px;
      color:#444;
      font-weight:bold;
    }

    .panel {

      padding:25px;
      border-radius:14px;
      margin-bottom:30px;

    }

    .mood-panel {
      background:#eef6ff;
    }

    .med-panel {
      background:#fff7e6;
    }

    .panel h2 {
      margin-top:0;
      margin-bottom:20px;
      text-align:center;
    }

    .btn-group {

      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:12px;

    }

    .choice-btn {

      padding:14px 20px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-size:16px;
      background:#d9d9d9;
      transition:0.2s;

    }

    .choice-btn.selected {

      background:#1E6FDB;
      color:white;
      transform:scale(1.05);

    }

    .save-btn {

      margin-top:20px;
      display:block;
      width:220px;
      margin-left:auto;
      margin-right:auto;

    }

    .status {

      text-align:center;
      margin-top:15px;
      font-weight:bold;
      color:green;

    }

  </style>

</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<div class="page">

  <!-- DATE -->
  <div class="today" id="today"></div>

  <!-- MOOD PANEL -->
  <div class
