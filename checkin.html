<!DOCTYPE html>
<html>
<head>
  <title>Daily Check-In</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">

  <style>
    .panel {
      margin:20px auto;
      padding:20px;
      border-radius:12px;
      max-width:500px;
    }

    .mood-panel { background:#E8F0FE; }
    .meds-panel { background:#E8F8F5; }

    .btn-group button{
      margin:5px;
      padding:12px;
      border-radius:8px;
      border:none;
      background:#1E6FDB;
      color:white;
      cursor:pointer;
    }

    .selected { background:#0B2A5B; }
  </style>
</head>

<body>

<div class="header">
  <img src="logo.jpg" class="logo">
  <div>
    <button class="btn" onclick="goHome()">Home</button>
    <button class="btn" onclick="goActivities()">Activities</button>
    <button class="btn" onclick="logout()">Logout</button>
  </div>
</div>

<div style="text-align:center;padding:20px;">

  <h2>Daily Check-In</h2>

  <p id="today"></p>
  <p id="status" style="color:green;font-weight:bold;"></p>

  <!-- MOOD -->
  <div class="panel mood-panel">
    <h3>How are you feeling today?</h3>

    <div id="moodBtns" class="btn-group">
      <button onclick="selectMood(this)">Great</button>
      <button onclick="selectMood(this)">Good</button>
      <button onclick="selectMood(this)">Low</button>
      <button onclick="selectMood(this)">Struggling</button>
    </div>

    <br>
    <button class="btn" onclick="submitMood()">Save Mood</button>
  </div>

  <!-- MEDS -->
  <div class="panel meds-panel">
    <h3>Did you take your medicine today?</h3>

    <div id="medBtns" class="btn-group">
      <button onclick="selectMeds(this)">Yes</button>
      <button onclick="selectMeds(this)">No</button>
    </div>

    <br>
    <button class="btn" onclick="submitMeds()">Save Medication</button>
  </div>

</div>

<script>

let selectedMood = "";
let selectedMeds = "";

// =========================
// DATE (FULL FORMAT)
// =========================
document.getElementById("today").innerText =
  new Date().toLocaleDateString('en-US',{
    weekday:'long',
    year:'numeric',
    month:'long',
    day:'numeric'
  });

// =========================
// LOAD SAVED DATA
// =========================
fetch('/checkin-today')
.then(r=>r.json())
.then(d=>{

  if(!d.checkedIn) return;

  selectedMood = d.mood || "";
  selectedMeds = d.meds || "";

  document.getElementById("status").innerText =
    "You already checked in today";

  highlightSelections();
});

// =========================
// SELECT FUNCTIONS
// =========================
function selectMood(btn){

  selectedMood = btn.innerText;

  document.querySelectorAll("#moodBtns button")
    .forEach(b=>b.classList.remove("selected"));

  btn.classList.add("selected");
}

function selectMeds(btn){

  selectedMeds = btn.innerText;

  document.querySelectorAll("#medBtns button")
    .forEach(b=>b.classList.remove("selected"));

  btn.classList.add("selected");
}

// =========================
// RESTORE SELECTIONS
// =========================
function highlightSelections(){

  document.querySelectorAll("#moodBtns button")
    .forEach(b=>{
      if(b.innerText === selectedMood){
        b.classList.add("selected");
      }
    });

  document.querySelectorAll("#medBtns button")
    .forEach(b=>{
      if(b.innerText === selectedMeds){
        b.classList.add("selected");
      }
    });
}

// =========================
// SUBMIT (SAFE)
// =========================
function submitMood(){

  if(!selectedMood){
    alert("Select a mood first");
    return;
  }

  fetch('/checkin',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      mood:selectedMood
    })
  })
  .then(()=> {
    document.getElementById("status").innerText="Mood saved!";
  });
}

function submitMeds(){

  if(!selectedMeds){
    alert("Select Yes or No");
    return;
  }

  fetch('/checkin',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      meds:selectedMeds
    })
  })
  .then(()=> {
    document.getElementById("status").innerText="Medication saved!";
  });
}

// NAV
function goHome(){ window.location='/home'; }
function goActivities(){ window.location='/activities'; }
function logout(){ fetch('/logout').then(()=>window.location='/'); }

</script>

</body>
</html>
