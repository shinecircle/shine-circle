<!DOCTYPE html>
<html>
<head>
  <title>Daily Check-In</title>
  <link rel="stylesheet" href="styles.css">

  <style>
    .btn { margin:5px; padding:10px; border:none; border-radius:6px; background:#1E6FDB; color:white; }
    .selected { background:#0B2A5B; }
    .disabled { background:#ccc !important; cursor:not-allowed; }
  </style>
</head>

<body>

<h2>Daily Check-In</h2>

<h3>Mood</h3>
<div id="moodBtns">
  <button onclick="selectMood(this)">Great</button>
  <button onclick="selectMood(this)">Good</button>
  <button onclick="selectMood(this)">Low</button>
  <button onclick="selectMood(this)">Struggling</button>
</div>

<h3>Medication</h3>
<div id="medBtns">
  <button onclick="selectMeds(this)">Yes</button>
  <button onclick="selectMeds(this)">No</button>
</div>

<br>

<button onclick="submit()">Submit</button>

<p id="msg"></p>

<script>

let mood="";
let meds="";
let locked=false;

// =========================
// LOAD EXISTING DATA
// =========================
fetch('/checkin-today')
.then(r=>r.json())
.then(d=>{
  if(d.checkedIn){
    mood = d.mood;
    meds = d.meds;
    locked = true;
    highlight();
    disable();
  }
});

// =========================
// SELECT
// =========================
function selectMood(btn){
  if(locked) return;

  mood = btn.innerText;

  document.querySelectorAll("#moodBtns button")
    .forEach(b=>b.classList.remove("selected"));

  btn.classList.add("selected");
}

function selectMeds(btn){
  if(locked) return;

  meds = btn.innerText;

  document.querySelectorAll("#medBtns button")
    .forEach(b=>b.classList.remove("selected"));

  btn.classList.add("selected");
}

// =========================
// HIGHLIGHT
// =========================
function highlight(){

  document.querySelectorAll("#moodBtns button")
    .forEach(b=>{
      if(b.innerText===mood) b.classList.add("selected");
    });

  document.querySelectorAll("#medBtns button")
    .forEach(b=>{
      if(b.innerText===meds) b.classList.add("selected");
    });
}

// =========================
// DISABLE
// =========================
function disable(){

  document.querySelectorAll("button")
    .forEach(b=>b.classList.add("disabled"));

}

// =========================
// SUBMIT
// =========================
function submit(){

  if(!mood){
    document.getElementById("msg").innerText="Select mood";
    return;
  }

  fetch('/checkin',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ mood, meds })
  })
  .then(()=>{

    document.getElementById("msg").innerText="Saved";

    locked = true;
    highlight();
    disable();
  });
}

</script>

</body>
</html>
