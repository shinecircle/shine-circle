<!DOCTYPE html>
<html>
<head>
  <title>Check-In | Shine Circle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">

  <style>
    .mood-btn {
      padding: 12px;
      margin: 5px;
      border-radius: 10px;
      border: none;
      background: #eef3ff;
      cursor: pointer;
    }

    .med-card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin: 10px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
  </style>
</head>

<body>

<div class="header">
  <img src="logo.jpg" class="logo">
  <button class="btn" onclick="goHome()">Home</button>
</div>

<div class="container">

  <!-- ===================== -->
  <!-- MOOD -->
  <!-- ===================== -->
  <h2>How are you feeling today?</h2>

  <div>
    <button class="mood-btn" onclick="saveMood('Great')">😊 Great</button>
    <button class="mood-btn" onclick="saveMood('Good')">🙂 Good</button>
    <button class="mood-btn" onclick="saveMood('Okay')">😐 Okay</button>
    <button class="mood-btn" onclick="saveMood('Not Great')">🙁 Not Great</button>
  </div>

  <p id="moodSaved"></p>

  <hr>

  <!-- ===================== -->
  <!-- MEDICATION -->
  <!-- ===================== -->
  <h2>Medications</h2>

  <div id="medList"></div>

</div>

<script>

function goHome(){
  window.location = 'home.html';
}

// =========================
// MOOD SAVE
// =========================
function saveMood(mood){

  fetch('/checkin',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({mood})
  });

  document.getElementById("moodSaved").innerText =
    "Saved: " + mood + " ✔";
}

// =========================
// LOAD MEDS
// =========================
function loadMeds(){

  fetch('/my-medications')
    .then(r=>r.json())
    .then(data=>{

      const container = document.getElementById("medList");
      container.innerHTML = "";

      data.forEach(med => {

        const div = document.createElement("div");
        div.className = "med-card";

        const takenText = med.taken === "Yes"
          ? `✔ Yes at ${new Date(med.timestamp).toLocaleTimeString()}`
          : "";

        div.innerHTML = `
          <b>${med.medicineName}</b><br>
          ${med.timeOfDay}<br><br>

          <button class="btn" onclick="takeMed(${med.id})">
            Yes, I've taken it
          </button>

          <div id="status-${med.id}" style="margin-top:8px; color:green;">
            ${takenText}
          </div>
        `;

        container.appendChild(div);
      });

    });
}

// =========================
// MARK MED TAKEN
// =========================
function takeMed(id){

  fetch('/medication',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      medicineName: "existing",
      timeOfDay: "now",
      taken: "Yes"
    })
  })
  .then(()=>{

    const el = document.getElementById("status-"+id);
    el.innerText = "✔ Yes at " + new Date().toLocaleTimeString();

  });
}

// INIT
loadMeds();

</script>

</body>
</html>
