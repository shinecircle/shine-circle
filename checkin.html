<!DOCTYPE html>
<html>
<head>
<title>Check-In</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div style="text-align:center;padding:20px;">

<h2>Daily Check-In</h2>

<div>
  <button onclick="selectMood(this)">Great</button>
  <button onclick="selectMood(this)">Good</button>
  <button onclick="selectMood(this)">Low</button>
  <button onclick="selectMood(this)">Struggling</button>
</div>

<br>

<div id="meds"></div>

<br>
<button onclick="submit()">Submit</button>

<p id="msg"></p>

</div>

<script>

let mood="";

function selectMood(btn){
  mood = btn.innerText;
}

function submit(){

  fetch('/checkin',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ mood })
  })
  .then(()=> document.getElementById("msg").innerText="Saved");
}

// LOAD MEDS
fetch('/my-medications')
.then(r=>r.json())
.then(data=>{

  const div = document.getElementById("meds");

  data.meds.forEach(m=>{

    const btn = document.createElement("button");

    btn.innerText = m.medicinename + " (" + m.timeofday + ")";

    btn.onclick = ()=>{
      fetch('/take-med',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ medicationId: m.id })
      }).then(()=>{
        btn.innerText = "✓ Taken";
      });
    };

    div.appendChild(btn);
  });

});

</script>
</body>
</html>
