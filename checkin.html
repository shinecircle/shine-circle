<!DOCTYPE html>
<html>
<head>
<title>Check-In</title>
<link rel="stylesheet" href="styles.css">

<style>
button { margin:5px; padding:10px; }
.selected { background:#1E6FDB; color:white; }
</style>

</head>

<body>

<div style="text-align:center;padding:20px;">

<h2>Daily Check-In</h2>

<div id="moods">
  <button onclick="selectMood(this)">Great</button>
  <button onclick="selectMood(this)">Good</button>
  <button onclick="selectMood(this)">Low</button>
  <button onclick="selectMood(this)">Struggling</button>
</div>

<br>

<div id="meds"></div>

<br>
<button onclick="submit()">Submit</button>

<p id="msg"></p>

</div>

<script>

let mood = "";

// SELECT MOOD
function selectMood(btn){
  mood = btn.innerText;

  document.querySelectorAll("#moods button")
    .forEach(b=>b.classList.remove("selected"));

  btn.classList.add("selected");
}

// SUBMIT (FIXED)
function submit(){

  if(!mood){
    document.getElementById("msg").innerText = "Select a mood first";
    return;
  }

  fetch('/checkin',{
    method:'POST',
    credentials:'include',   // ⭐ THIS FIXES EVERYTHING
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ mood })
  })
  .then(r=>r.json())
  .then(data=>{
    if(data.success){
      document.getElementById("msg").innerText = "Saved ✓";
    } else {
      document.getElementById("msg").innerText = "Not logged in";
    }
  })
  .catch(()=>{
    document.getElementById("msg").innerText = "Server error";
  });
}

// LOAD MEDS (FIXED)
fetch('/my-medications', { credentials:'include' })
.then(r=>r.json())
.then(data=>{

  const div = document.getElementById("meds");

  data.meds.forEach(m=>{

    const btn = document.createElement("button");

    btn.innerText = m.medicinename + " (" + m.timeofday + ")";

    btn.onclick = ()=>{
      fetch('/take-med',{
        method:'POST',
        credentials:'include',   // ⭐ ALSO IMPORTANT
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ medicationId: m.id })
      }).then(()=>{
        btn.innerText = "✓ Taken";
        btn.classList.add("selected");
      });
    };

    div.appendChild(btn);
  });

});

</script>
</body>
</html>
