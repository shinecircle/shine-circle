<!DOCTYPE html>
<html>
<head>
<title>Checkin</title>
</head>

<body>

<h2>Check-In</h2>

<div>
<button onclick="pickMood(this)">Great</button>
<button onclick="pickMood(this)">Good</button>
<button onclick="pickMood(this)">Low</button>
<button onclick="pickMood(this)">Struggling</button>
</div>

<br>

<div>
<button onclick="pickMeds(this)">Yes</button>
<button onclick="pickMeds(this)">No</button>
</div>

<br>

<button onclick="save()">Save</button>

<p id="msg"></p>

<script>

let mood="";
let meds="";

function pickMood(b){
  mood = b.innerText;
  document.querySelectorAll("button").forEach(x=>x.style.background="");
  b.style.background="blue";
}

function pickMeds(b){
  meds = b.innerText;
  b.style.background="green";
}

function save(){
  fetch('/checkin',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ mood, meds })
  })
  .then(r=>r.json())
  .then(d=>{
    document.getElementById("msg").innerText="Saved";
    load();
  });
}

function load(){
  fetch('/checkin-today')
  .then(r=>r.json())
  .then(d=>{
    console.log("LOADED:", d);
    if(d.checkedIn){
      document.getElementById("msg").innerText =
        "Loaded: " + d.mood + " / " + d.meds;
    }
  });
}

load();

</script>

</body>
</html>
