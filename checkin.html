<!DOCTYPE html>
<html>
<head>
  <title>Daily Check-In</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">

  <style>

    body{
      font-family:Arial;
    }

    .panel {
      margin:20px auto;
      padding:20px;
      border-radius:12px;
      max-width:500px;
    }

    .mood-panel {
      background:#E8F0FE;
    }

    .meds-panel {
      background:#E8F8F5;
    }

    .btn-group button{
      margin:5px;
      padding:12px 18px;
      border-radius:8px;
      border:none;
      background:#1E6FDB;
      color:white;
      cursor:pointer;
      transition:.2s;
      font-size:16px;
    }

    /* currently selected */
    .selected {
      outline:3px solid #0B2A5B;
    }

    /* successfully saved to DB */
    .saved {
      background:#1E8E3E !important;
      color:white;
    }

    .status-success{
      color:green;
      font-weight:bold;
    }

    .status-error{
      color:red;
      font-weight:bold;
    }

  </style>
</head>

<body>

<div class="header">
  <img src="logo.jpg" class="logo">

  <div>
    <button class="btn" onclick="goHome()">Home</button>
    <button class="btn" onclick="goActivities()">Activities</button>
    <button class="btn" onclick="logout()">Logout</button>
  </div>
</div>

<div style="text-align:center;padding:20px;">

  <h2>Daily Check-In</h2>

  <p id="today"></p>

  <p id="status"></p>

  <!-- MOOD -->
  <div class="panel mood-panel">

    <h3>How are you feeling today?</h3>

    <div id="moodBtns" class="btn-group">

      <button onclick="selectMood(this)">Great</button>

      <button onclick="selectMood(this)">Good</button>

      <button onclick="selectMood(this)">Low</button>

      <button onclick="selectMood(this)">Struggling</button>

    </div>

    <br>

    <button class="btn" onclick="submitMood()">
      Save Mood
    </button>

  </div>

  <!-- MEDS -->
  <div class="panel meds-panel">

    <h3>Did you take your medicine today?</h3>

    <div id="medBtns" class="btn-group">

      <button onclick="selectMeds(this)">Yes</button>

      <button onclick="selectMeds(this)">No</button>

    </div>

    <br>

    <button class="btn" onclick="submitMeds()">
      Save Medication
    </button>

  </div>

</div>

<script>

let selectedMood = "";
let selectedMeds = "";

// =========================
// DATE
// =========================
document.getElementById("today").innerText =
  new Date().toLocaleDateString('en-US',{
    weekday:'long',
    year:'numeric',
    month:'long',
    day:'numeric'
  });

// =========================
// LOAD SAVED DATA
// =========================
loadTodayCheckin();

async function loadTodayCheckin(){

  try{

    const response = await fetch('/checkin-today');
    const data = await response.json();

    if(!data.checkedIn){
      return;
    }

    selectedMood = data.mood || "";
    selectedMeds = data.meds || "";

    document.getElementById("status").innerHTML =
      "Today's check-in already saved";

    document.getElementById("status").className =
      "status-success";

    restoreSavedSelections();

  }catch(err){

    console.error(err);

  }
}

// =========================
// SELECT FUNCTIONS
// =========================
function clearSelection(groupId){

  document.querySelectorAll(`#${groupId} button`)
    .forEach(btn=>{
      btn.classList.remove("selected");
    });
}

function selectMood(btn){

  selectedMood = btn.innerText;

  clearSelection("moodBtns");

  btn.classList.add("selected");
}

function selectMeds(btn){

  selectedMeds = btn.innerText;

  clearSelection("medBtns");

  btn.classList.add("selected");
}

// =========================
// RESTORE SAVED BUTTONS
// =========================
function restoreSavedSelections(){

  document.querySelectorAll("#moodBtns button")
    .forEach(btn=>{

      if(btn.innerText === selectedMood){

        btn.classList.add("saved");

      }

    });

  document.querySelectorAll("#medBtns button")
    .forEach(btn=>{

      if(btn.innerText === selectedMeds){

        btn.classList.add("saved");

      }

    });
}

// =========================
// SAVE MOOD
// =========================
async function submitMood(){

  if(!selectedMood){

    alert("Select a mood first");

    return;
  }

  try{

    const response = await fetch('/checkin',{

      method:'POST',

      headers:{
        'Content-Type':'application/json'
      },

      body:JSON.stringify({
        mood:selectedMood
      })

    });

    const data = await response.json();

    if(data.success){

      document.getElementById("status").innerText =
        "Mood saved successfully";

      document.getElementById("status").className =
        "status-success";

      // clear old saved state
      document.querySelectorAll("#moodBtns button")
        .forEach(btn=>{
          btn.classList.remove("saved");
        });

      // mark saved button
      document.querySelectorAll("#moodBtns button")
        .forEach(btn=>{

          if(btn.innerText === selectedMood){

            btn.classList.add("saved");

          }

        });

    }else{

      throw new Error();

    }

  }catch(err){

    console.error(err);

    document.getElementById("status").innerText =
      "Error saving mood";

    document.getElementById("status").className =
      "status-error";

  }
}

// =========================
// SAVE MEDS
// =========================
async function submitMeds(){

  if(!selectedMeds){

    alert("Select Yes or No");

    return;
  }

  try{

    const response = await fetch('/checkin',{

      method:'POST',

      headers:{
        'Content-Type':'application/json'
      },

      body:JSON.stringify({
        meds:selectedMeds
      })

    });

    const data = await response.json();

    if(data.success){

      document.getElementById("status").innerText =
        "Medication saved successfully";

      document.getElementById("status").className =
        "status-success";

      // clear old saved state
      document.querySelectorAll("#medBtns button")
        .forEach(btn=>{
          btn.classList.remove("saved");
        });

      // mark saved button
      document.querySelectorAll("#medBtns button")
        .forEach(btn=>{

          if(btn.innerText === selectedMeds){

            btn.classList.add("saved");

          }

        });

    }else{

      throw new Error();

    }

  }catch(err){

    console.error(err);

    document.getElementById("status").innerText =
      "Error saving medication";

    document.getElementById("status").className =
      "status-error";

  }
}

// =========================
// NAV
// =========================
function goHome(){
  window.location='/home';
}

function goActivities(){
  window.location='/activities';
}

function logout(){

  fetch('/logout')
    .then(()=>{
      window.location='/';
    });

}

</script>

</body>
</html>
