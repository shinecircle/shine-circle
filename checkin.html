<!DOCTYPE html>
<html>
<head>
  <title>Daily Check-In</title>

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles.css">

  <style>

    .panel{
      margin:20px auto;
      padding:20px;
      border-radius:12px;
      max-width:500px;
    }

    .mood-panel{
      background:#E8F0FE;
    }

    .meds-panel{
      background:#E8F8F5;
    }

    .btn-group button{
      margin:5px;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#1E6FDB;
      color:white;
      cursor:pointer;
    }

    .selected{
      outline:3px solid #0B2A5B;
    }

    .saved{
      background:green !important;
    }

  </style>

</head>

<body>

<div class="header">

  <img src="logo.jpg" class="logo">

  <div>

    <button class="btn"
            onclick="goHome()">
      Home
    </button>

    <button class="btn"
            onclick="goActivities()">
      Activities
    </button>

    <button class="btn"
            onclick="logout()">
      Logout
    </button>

  </div>

</div>

<div style="text-align:center;padding:20px;">

  <h2>Daily Check-In</h2>

  <p id="today"></p>

  <p id="status"></p>

  <!-- MOOD -->
  <div class="panel mood-panel">

    <h3>How are you feeling today?</h3>

    <div id="moodBtns"
         class="btn-group">

      <button onclick="selectMood(this)">
        Great
      </button>

      <button onclick="selectMood(this)">
        Good
      </button>

      <button onclick="selectMood(this)">
        Low
      </button>

      <button onclick="selectMood(this)">
        Struggling
      </button>

    </div>

    <br>

    <button class="btn"
            onclick="submitMood()">
      Save Mood
    </button>

  </div>

  <!-- MEDS -->
  <div class="panel meds-panel">

    <h3>Did you take your medicine today?</h3>

    <div id="medBtns"
         class="btn-group">

      <button onclick="selectMeds(this)">
        Yes
      </button>

      <button onclick="selectMeds(this)">
        No
      </button>

    </div>

    <br>

    <button class="btn"
            onclick="submitMeds()">
      Save Medication
    </button>

  </div>

</div>

<script>

let selectedMood = "";
let selectedMeds = "";

// DATE
document.getElementById("today").innerText =

  new Date().toLocaleDateString('en-US',{

    weekday:'long',

    year:'numeric',

    month:'long',

    day:'numeric'

  });

// LOAD TODAY
loadToday();

async function loadToday(){

  try{

    const response =
      await fetch('/api/checkin-today');

    const data =
      await response.json();

    if(!data.checkedIn){
      return;
    }

    selectedMood =
      data.mood || "";

    selectedMeds =
      data.meds || "";

    restoreButtons();

  }

  catch(err){

    console.log(err);

  }

}

// SELECT
function selectMood(btn){

  selectedMood =
    btn.innerText.trim();

  document.querySelectorAll("#moodBtns button")
    .forEach(b=>{

      b.classList.remove("selected");

    });

  btn.classList.add("selected");

}

function selectMeds(btn){

  selectedMeds =
    btn.innerText.trim();

  document.querySelectorAll("#medBtns button")
    .forEach(b=>{

      b.classList.remove("selected");

    });

  btn.classList.add("selected");

}

// RESTORE
function restoreButtons(){

  document.querySelectorAll("#moodBtns button")
    .forEach(btn=>{

      if(btn.innerText.trim() === selectedMood){

        btn.classList.add("saved");

      }

    });

  document.querySelectorAll("#medBtns button")
    .forEach(btn=>{

      if(btn.innerText.trim() === selectedMeds){

        btn.classList.add("saved");

      }

    });

}

// SAVE MOOD
async function submitMood(){

  try{

    const response = await fetch('/api/checkin',{

      method:'POST',

      headers:{
        'Content-Type':'application/json'
      },

      body:JSON.stringify({

        mood:selectedMood

      })

    });

    const data =
      await response.json();

    if(!data.success){

      throw new Error(data.error);

    }

    document.getElementById("status").innerText =
      "Mood saved";

    restoreButtons();

  }

  catch(err){

    document.getElementById("status").innerText =
      err.message;

  }

}

// SAVE MEDS
async function submitMeds(){

  try{

    const response = await fetch('/api/checkin',{

      method:'POST',

      headers:{
        'Content-Type':'application/json'
      },

      body:JSON.stringify({

        meds:selectedMeds

      })

    });

    const data =
      await response.json();

    if(!data.success){

      throw new Error(data.error);

    }

    document.getElementById("status").innerText =
      "Medication saved";

    restoreButtons();

  }

  catch(err){

    document.getElementById("status").innerText =
      err.message;

  }

}

// NAV
function goHome(){

  window.location='/home';

}

function goActivities(){

  window.location='/activities';

}

function logout(){

  fetch('/logout')
    .then(()=>{

      window.location='/';

    });

}

</script>

</body>
</html>
