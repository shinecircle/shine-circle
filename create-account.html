```html
<!DOCTYPE html>
<html>

<head>

<title>Create Account | Shine Circle</title>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<link
rel="stylesheet"
href="styles.css">

<style>

body{
text-align:center;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:#f7f7f7;
padding:30px;
border-radius:16px;
margin-top:20px;
}

input{

width:90%;

padding:14px;

margin:10px 0;

font-size:16px;

border-radius:8px;

border:1px solid #ccc;

}

.submit-btn{

width:90%;

padding:16px;

font-size:18px;

}

.success{
color:green;
margin-top:15px;
}

.error{
color:red;
margin-top:15px;
}

.section-title{

margin-top:10px;

margin-bottom:15px;

}

hr{

margin:30px 0;

border:none;

border-top:1px solid #ddd;

}

</style>

</head>

<body>

<div id="header"></div>

<div class="container">

<h1>

Create Your Accounts

</h1>

<p>

Create your accounts to get started

</p>

<div class="card">

<h2 class="section-title">

User Information

</h2>

<input
id="userFirstName"
placeholder="First Name">

<input
id="userLastName"
placeholder="Last Name">

<input
id="userUsername"
placeholder="Username">

<input
id="userPassword"
type="password"
placeholder="Password">

<hr>

<h2 class="section-title">

Caregiver Information

</h2>

<input
id="familyFirstName"
placeholder="First Name">

<input
id="familyLastName"
placeholder="Last Name">

<input
id="familyUsername"
placeholder="Username">

<input
id="familyPassword"
type="password"
placeholder="Password">

<br>

<button
class="btn submit-btn"
onclick="createAccounts()">

Create Accounts

</button>

<div id="message"></div>

</div>

</div>

<script>

// HEADER

fetch('/header')

.then(r=>r.text())

.then(html=>{

document
.getElementById(
'header'
)

.innerHTML=

html;

const buttons=

document
.getElementById(
'headerButtons'
);

if(buttons){

buttons.innerHTML=

`

<button
class="btn"
onclick="window.location='/login'">

Login

</button>

`;

}

});

// CREATE

async function createAccounts(){

const user={

firstname:
document
.getElementById(
'userFirstName'
)
.value
.trim(),

lastname:
document
.getElementById(
'userLastName'
)
.value
.trim(),

username:
document
.getElementById(
'userUsername'
)
.value
.trim(),

password:
document
.getElementById(
'userPassword'
)
.value,

role:
'user'

};

const family={

firstname:
document
.getElementById(
'familyFirstName'
)
.value
.trim(),

lastname:
document
.getElementById(
'familyLastName'
)
.value
.trim(),

username:
document
.getElementById(
'familyUsername'
)
.value
.trim(),

password:
document
.getElementById(
'familyPassword'
)
.value,

role:
'family'

};

if(

Object
.values(user)
.some(v=>!v)

||

Object
.values(family)
.some(v=>!v)

){

showError(

"Please complete all fields."

);

return;

}

try{

const userResult=

await fetch(

'/api/create-account',

{

method:'POST',

headers:{
'Content-Type':
'application/json'
},

body:
JSON.stringify(
user
)

}

);

const familyResult=

await fetch(

'/api/create-account',

{

method:'POST',

headers:{
'Content-Type':
'application/json'
},

body:
JSON.stringify(
family
)

}

);

const userData=
await userResult.json();

const familyData=
await familyResult.json();

if(
!userData.success
||

!familyData.success
){

showError(

userData.message ||

familyData.message ||

"Unable to create accounts"

);

return;

}

showSuccess(

"Accounts created successfully"

);

setTimeout(()=>{

window.location=
'/login';

},1500);

}

catch{

showError(

"Server error"

);

}

}

function showSuccess(text){

document
.getElementById(
'message'
)

.innerHTML=

`

<div class="success">

${text}

</div>

`;

}

function showError(text){

document
.getElementById(
'message'
)

.innerHTML=

`

<div class="error">

${text}

</div>

`;

}

</script>

</body>

</html>
```
