
<!DOCTYPE html>
<html>

<head>

<title>Family Dashboard</title>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<link
rel="stylesheet"
href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

.page{
max-width:1000px;
margin:auto;
padding:18px;
}

.card{
padding:20px;
margin:14px 0;
border-radius:18px;
background:white;
box-shadow:0 4px 12px rgba(0,0,0,.06);
}

.stats-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.stat-box{
background:#f5f8ff;
padding:22px;
border-radius:16px;
text-align:center;
}

.stat-number{
font-size:38px;
font-weight:800;
color:#1E6FDB;
}

.chart-wrap{
height:280px;
}

.alert{
background:#ffe8e8;
padding:16px;
border-radius:14px;
margin-top:14px;
}

</style>

</head>

<body>

<div id="header"></div>

<div class="page">

<h2 id="welcome">
Family Dashboard
</h2>

<div class="card">

<h3>
Phone Call Statistics
</h3>

<div class="stats-grid">

<div class="stat-box">

<div
class="stat-number"
id="callMinutes">

0

</div>

<div>
Total Minutes
</div>

</div>

<div class="stat-box">

<div
class="stat-number"
id="callCount">

0

</div>

<div>
Total Calls
</div>

</div>

</div>

<div style="margin-top:20px">

<h4>
Most Recent 7 Calls
</h4>

<div id="callDates">
No calls
</div>

</div>

</div>

<div class="card">

<h3>
Mood
</h3>

<div id="moodAlerts"></div>

<div class="chart-wrap">

<canvas id="chart"></canvas>

</div>

</div>

<div class="card">

<h3>
Medication
</h3>

<p id="medRate">
Loading...
</p>

<div id="medAlerts"></div>

</div>

<div class="card">

<h3>
Preferred Call Schedule
</h3>

<p id="schedule">

Loading...

</p>

</div>

</div>

<script>

let dataGlobal = [];
let callsGlobal = [];
let userGlobal = {};

// HEADER

fetch('/header')

.then(r=>r.text())

.then(html=>{

document.getElementById(
'header'
).innerHTML = html;

const buttons =
document.getElementById(
'headerButtons'
);

if(buttons){

buttons.innerHTML = `

<button
class="btn"
onclick="goHome()">

Home

</button>

<button
class="btn"
onclick="logout()">

Logout

</button>

`;

}

loadPage();

})

.catch(()=>{

loadPage();

});

// LOAD

async function loadPage(){

try{

const family =
await fetch(
'/family-data'
)
.then(r=>r.json());

userGlobal =
family.user || {};

dataGlobal =
family.checkins || [];

try{

callsGlobal =
await fetch(
'/api/calls'
)
.then(r=>r.json());

}

catch{

callsGlobal=[];

}

renderUser();
renderCalls();
renderMood();
renderMedication();
renderSchedule();
renderChart();

}

catch(err){

console.log(err);

document
.getElementById(
'medRate'
)
.innerText =
'Unable to load';

document
.getElementById(
'schedule'
)
.innerText =
'Unable to load';

}

}

// USER

function renderUser(){

document
.getElementById(
'welcome'
)
.innerText =

userGlobal.firstName

?

userGlobal.firstName
+
"'s Dashboard"

:

"Family Dashboard";

}

// CALLS

function renderCalls(){

document
.getElementById(
'callCount'
)
.innerText =
callsGlobal.length;

document
.getElementById(
'callDates'
)
.innerHTML =

callsGlobal

.slice(0,7)

.map(
c=>

new Date(
c.calldate
)

.toLocaleDateString()

)

.join("<br>")

||

"No calls";

}

// MOOD

function renderMood(){

const struggling =

dataGlobal.filter(
d=>
d.mood==="Struggling"
);

document
.getElementById(
'moodAlerts'
)

.innerHTML =

struggling.length

?

`

<div class="alert">

<strong>

⚠ Reported Struggling Mood

</strong>

<br><br>

These dates indicate the user selected
Struggling.

<br><br>

${struggling

.map(
d=>

new Date(
d.timestamp
)

.toLocaleDateString()

)

.join("<br>")}

</div>

`

:

`

<div
style="
background:#ecfff0;
padding:16px;
border-radius:14px;
">

✓ No struggling moods reported

</div>

`;

}

// MEDICATION

function renderMedication(){

const total =
dataGlobal.length;

const taken =
dataGlobal.filter(
d=>
d.meds==="Yes"
);

const missed =
dataGlobal.filter(
d=>
d.meds==="No"
);

const missing =
dataGlobal.filter(
d=>
!d.meds
);

const percent =

total

?

Math.round(
(
taken.length
/
total
)
*
100
)

:

0;

document
.getElementById(
'medRate'
)

.innerHTML=

`

<div
style="
font-size:30px;
font-weight:800;
color:#1E6FDB;
">

${percent}%

</div>

<div>

Medication Reported Taken

</div>

<div>

✓ Taken:
${taken.length}

<br>

✕ Missed:
${missed.length}

<br>

○ Not Recorded:
${missing.length}

</div>

`;

document
.getElementById(
'medAlerts'
)

.innerHTML =

missed.length

?

`

<div class="alert">

<strong>

Medication Missed On:

</strong>

<br><br>

${missed

.map(
d=>

new Date(
d.timestamp
)

.toLocaleDateString()

)

.join("<br>")}

</div>

`

:

'';

}

// SCHEDULE

function renderSchedule(){

document
.getElementById(
'schedule'
)

.innerText=

userGlobal.dayForCall

?

userGlobal.dayForCall

*

" • "

*

userGlobal.timeForCall

*

" • "

*

userGlobal.timezone

:

"Not configured";

}

// CHART

function renderChart(){

new Chart(

document
.getElementById(
'chart'
),

{

type:'line',

data:{

labels:[],

datasets:[{

data:[]

}]

}

}

);

}

// NAV

function goHome(){

window.location='/home';

}

function logout(){

fetch('/logout')

.then(()=>{

window.location='/login';

});

}

</script>

</body>

</html>
