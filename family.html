<!DOCTYPE html>
<html>
<head>
  <title>Family Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="header">
  <img src="logo.jpg" class="logo">
  <button class="btn" onclick="logout()">Logout</button>
</div>

<div style="padding:20px;text-align:center;">

  <h2 id="dashboardTitle">Dashboard</h2>
  <p id="lovedOne"></p>

  <h3>Mood Trend</h3>
  <canvas id="moodChart" height="120"></canvas>

  <h3>Medication Taken</h3>
  <canvas id="medChart" height="120"></canvas>

</div>

<script>

function load(){

  fetch('/family-data')
  .then(r=>r.json())
  .then(data=>{

    // =========================
    // HEADER
    // =========================
    fetch('/auth')
    .then(r=>r.json())
    .then(user=>{
      if(user && user.firstName){
        document.getElementById("dashboardTitle").innerText =
          user.firstName + "'s Dashboard";
      }
    });

    if(data.user){
      const name = data.user.nickname || data.user.firstName || "User";
      document.getElementById("lovedOne").innerText =
        "Loved One: " + name;
    }

    // =========================
    // SORT DATA BY TIME (EARLIEST FIRST)
    // =========================
    const checkins = data.checkins.sort(
      (a,b)=> new Date(a.timestamp) - new Date(b.timestamp)
    );

    const meds = data.meds;

    // =========================
    // BUILD LABELS + DATA
    // =========================
    const labels = [];
    const moodData = [];
    const medData = [];

    const moodMap = {
      "Struggling":1,
      "Low":2,
      "Good":3,
      "Great":4
    };

    checkins.forEach(c=>{

      const date = new Date(c.timestamp);
      const label = date.toLocaleDateString('en-US',{
        month:'short',
        day:'numeric'
      });

      labels.push(label);

      // MOOD
      moodData.push(moodMap[c.mood] || null);

      // MEDICATION (was any med taken that day?)
      const medTaken = meds.some(m =>
        new Date(m.timestamp).toDateString() === date.toDateString()
      );

      medData.push(medTaken ? 1 : 0);

    });

    // =========================
    // MOOD CHART
    // =========================
    new Chart(document.getElementById('moodChart'), {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Mood',
          data: moodData,
          tension: 0.3
        }]
      },
      options: {
        scales: {
          y: {
            min:1,
            max:4,
            ticks: {
              callback: function(value){
                return ["","Struggling","Low","Good","Great"][value];
              }
            }
          }
        }
      }
    });

    // =========================
    // MEDICATION CHART
    // =========================
    new Chart(document.getElementById('medChart'), {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Medication Taken',
          data: medData
        }]
      },
      options: {
        scales: {
          y: {
            min:0,
            max:1,
            ticks: {
              callback: function(value){
                return value === 1 ? "Yes" : "No";
              }
            }
          }
        }
      }
    });

  });
}

function logout(){
  fetch('/logout').then(()=> window.location='login.html');
}

load();

</script>

</body>
</html>
