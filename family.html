```html
<!DOCTYPE html>
<html>

<head>

<title>Family Dashboard</title>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<link
rel="stylesheet"
href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

.page{
max-width:1000px;
margin:auto;
padding:18px;
}

.card{
padding:20px;
margin:14px 0;
border-radius:18px;
background:white;
box-shadow:0 4px 12px rgba(0,0,0,.06);
}

.stats-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.stat-box{
background:#f5f8ff;
padding:22px;
border-radius:16px;
text-align:center;
}

.stat-number{
font-size:38px;
font-weight:800;
color:#1E6FDB;
}

.chart-wrap{
height:280px;
}

.alert{
background:#ffe8e8;
padding:16px;
border-radius:14px;
margin-top:14px;
}

</style>

</head>

<body>

<div id="header"></div>

<div class="page">

<h2 id="welcome"></h2>

<div id="monitorHeader"></div>

<div class="card">

<h3>

Phone Call Statistics

</h3>

<div class="stats-grid">

<div class="stat-box">

<div
class="stat-number"
id="callMinutes">

0

</div>

<div>

Total Minutes

</div>

</div>

<div class="stat-box">

<div
class="stat-number"
id="callCount">

0

</div>

<div>

Total Calls

</div>

</div>

</div>

<div style="margin-top:20px">

<h4>

Most Recent 7 Calls

</h4>

<div id="callDates">

No calls

</div>

</div>

</div>

<div class="card">

<h3>

Mood

h3>

<div id="moodAlerts"></div>

<div class="chart-wrap">

<canvas id="chart"></canvas>

</div>

</div>

<div class="card">

<h3>

Medication

</h3>

<p id="medRate"></p>

<div id="medAlerts"></div>

</div>

<div class="card">

<h3>

Preferred Call Schedule

</h3>

<p id="schedule">

Loading...

</p>

</div>

</div>

<script>

let dataGlobal=[];

let callsGlobal=[];

// HEADER

fetch('/header')

.then(r=>r.text())

.then(html=>{

document
.getElementById(
'header'
)

.innerHTML=

html;

const buttons=

document
.getElementById(
'headerButtons'
);

if(buttons){

buttons.innerHTML=

`

<button
class="btn"
onclick="logout()">

Logout

</button>

`;

}

});

// DATA

Promise.all([

fetch('/family-data')
.then(r=>r.json()),

fetch('/api/calls')
.then(r=>r.json())

])

.then(([data,calls])=>{

dataGlobal=

data.checkins || [];

callsGlobal=

calls || [];

renderCalls();

renderMood();

renderMedication();

renderChart();

});

// CALLS

function renderCalls(){

const sorted=

[...callsGlobal]

.sort(

(a,b)=>

new Date(
b.calldate
)

-

new Date(
a.calldate
)

);

document
.getElementById(
'callCount'
)

.innerText=

sorted.length;

document
.getElementById(
'callDates'
)

.innerHTML=

sorted

.slice(0,7)

.map(

c=>

new Date(
c.calldate
)

.toLocaleDateString()

)

.join("<br>");

}

// MOOD

function renderMood(){

const struggling=

dataGlobal

.filter(

d=>

d.mood==="Struggling"

)

.reverse();

document
.getElementById(
'moodAlerts'
)

.innerHTML=

struggling.length

?

`<div class="alert">

${struggling

.map(

d=>

new Date(
d.timestamp
)

.toLocaleDateString()

)

.join("<br>")}

</div>`

:

"";

}

// MED

function renderMedication(){

const taken=

dataGlobal

.filter(

d=>

d.meds==="Yes"

)

.length;

document
.getElementById(
'medRate'
)

.innerText=

`${taken}/${dataGlobal.length}`;

}

// CHART

function renderChart(){

new Chart(

document
.getElementById(
'chart'
),

{

type:'line',

data:{

labels:[],

datasets:[{

data:[]

}]

}

}

);

}

// LOGOUT

function logout(){

fetch('/logout')

.then(()=>{

window.location=
'/login';

});

}

</script>

</body>

</html>
```
