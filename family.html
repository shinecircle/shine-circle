<!DOCTYPE html>
<html>
<head>
  <title>Family Dashboard | Shine Circle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="header">
  <img src="logo.jpg" class="logo">
  <button class="btn" onclick="logout()">Logout</button>
</div>

<div class="container">

  <h1>Family Dashboard</h1>

  <h3>Mood Check-ins</h3>
  <div id="checkins"></div>

  <h3>Medications</h3>
  <div id="meds"></div>

  <h3>Calls</h3>
  <div id="calls"></div>

</div>

<script>

function loadData(){

  fetch('/family-data')
  .then(r=>r.json())
  .then(data=>{

    // CHECKINS
    const c = document.getElementById("checkins");
    c.innerHTML = "";
    data.checkins.forEach(x=>{
      const div = document.createElement("div");
      div.innerText = `${x.mood} (${new Date(x.timestamp).toLocaleString()})`;
      c.appendChild(div);
    });

    // MEDS
    const m = document.getElementById("meds");
    m.innerHTML = "";
    data.meds.forEach(x=>{
      const div = document.createElement("div");
      div.innerText = `${x.medicineName} - ${x.taken} (${x.timeOfDay})`;
      m.appendChild(div);
    });

    // CALLS
    const calls = document.getElementById("calls");
    calls.innerHTML = "";
    data.calls.forEach(x=>{
      const div = document.createElement("div");
      div.innerText =
        `Call with ${x.callWith} - ${Math.round(x.duration/60)} min`;
      calls.appendChild(div);
    });

  });
}

function logout(){
  fetch('/logout').then(()=> window.location='login.html');
}

loadData();

</script>

</body>
</html>
