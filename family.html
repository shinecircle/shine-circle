
<!DOCTYPE html>
<html>

<head>

<title>Family Dashboard</title>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<link
rel="stylesheet"
href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

.page{
max-width:1000px;
margin:auto;
padding:18px;
}

.card{
padding:20px;
margin:14px 0;
border-radius:18px;
background:white;
box-shadow:0 4px 12px rgba(0,0,0,.06);
}

.stats-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.stat-box{
background:#f5f8ff;
padding:22px;
border-radius:16px;
text-align:center;
}

.stat-number{
font-size:38px;
font-weight:800;
color:#1E6FDB;
}

.chart-wrap{
height:280px;
}

.alert{
background:#ffe8e8;
padding:16px;
border-radius:14px;
margin-top:14px;
}

</style>

</head>

<body>

<div id="header"></div>

<div class="page">

<h2 id="welcome">
Family Dashboard
</h2>

<div class="card">

<h3>
Phone Call Statistics
</h3>

<div class="stats-grid">

<div class="stat-box">

<div
class="stat-number"
id="callMinutes">

0

</div>

<div>
Total Minutes
</div>

</div>

<div class="stat-box">

<div
class="stat-number"
id="callCount">

0

</div>

<div>
Total Calls
</div>

</div>

</div>

<div style="margin-top:20px">

<h4>
Most Recent 7 Calls
</h4>

<div id="callDates">
No calls
</div>

</div>

</div>

<div class="card">

<h3>
Mood
</h3>

<div id="moodAlerts"></div>

<div class="chart-wrap">

<canvas id="chart"></canvas>

</div>

</div>

<div class="card">

<h3>
Medication
</h3>

<p id="medRate">
Loading...
</p>

<div id="medAlerts"></div>

</div>

<div class="card">

<h3>
Preferred Call Schedule
</h3>

<p id="schedule">

Loading...

</p>

</div>

</div>

<script>

let dataGlobal=[];
let callsGlobal=[];
let userGlobal={};

// HEADER

fetch('/header')

.then(r=>r.text())

.then(html=>{

document
.getElementById(
'header'
)

.innerHTML=

html;

const buttons=

document
.getElementById(
'headerButtons'
);

if(buttons){

buttons.innerHTML=

`

<button
class="btn"
onclick="goHome()">

Home

</button>

<button
class="btn"
onclick="logout()">

Logout

</button>

`;

}

})

.catch(err=>{

console.log(
'Header error',
err
);

});


const buttons=
document.getElementById(
'headerButtons'
);

if(buttons){

buttons.innerHTML=`

<button
class="btn"
onclick="goHome()">

Home

</button>

<button
class="btn"
onclick="logout()">

Logout

</button>

`;

}

});

// LOAD

Promise.all([

fetch('/family-data')
.then(r=>r.json()),

fetch('/api/calls')
.then(r=>r.json())

])

.then(([data,calls])=>{

userGlobal=
data.user||{};

dataGlobal=
data.checkins||[];

callsGlobal=
calls||[];

renderUser();

renderCalls();

renderMood();

renderMedication();

renderSchedule();

renderChart();

});


.catch(err=>{

console.log(
'Load error',
err
);

document
.getElementById(
'medRate'
)

.innerText=

'Unable to load';

document
.getElementById(
'schedule'
)

.innerText=

'Unable to load';

});



// USER

function renderUser(){

if(userGlobal.firstName){

document
.getElementById(
'welcome'
)

.innerText=

`${userGlobal.firstName}'s Dashboard`;

}

}

// CALLS

function renderCalls(){

document
.getElementById(
'callCount'
)

.innerText=

callsGlobal.length;

let total=0;

callsGlobal.forEach(c=>{

if(
c.starttime &&
c.endtime
){

const s=
new Date(
`2000-01-01 ${c.starttime}`
);

const e=
new Date(
`2000-01-01 ${c.endtime}`
);

total+=
(e-s)
/60000;

}

});

document
.getElementById(
'callMinutes'
)

.innerText=

Math.max(
0,
Math.round(total)
);

document
.getElementById(
'callDates'
)

.innerHTML=

callsGlobal

.slice(0,7)

.map(
c=>

new Date(
c.calldate
)

.toLocaleDateString()

)

.join('<br>')

||

'No calls';

}

// MOOD 

function renderMood(){ 
const struggling= 

dataGlobal.filter( d=> d.mood==="Struggling" ); document .getElementById( 'moodAlerts' ) .innerHTML= struggling.length ? ` <div class="alert"> <strong> ⚠ Reported "Struggling" Mood </strong> <br><br> These dates indicate the user selected <strong> Struggling </strong> during their daily check-in. <br><br> ${struggling .map( d=> new Date( d.timestamp ) .toLocaleDateString() ) .join("<br>")} </div> ` : ` <div style=" background:#ecfff0; padding:16px; border-radius:14px; "> ✓ No struggling moods reported </div> `; } 

// MEDICATION 

function renderMedication(){ const total= dataGlobal.length; const taken= dataGlobal.filter( d=> d.meds==="Yes" ); const missed= dataGlobal.filter( d=> d.meds==="No" ); const missing= dataGlobal.filter( d=> !d.meds ); const percent= total ? Math.round( ( taken.length / total ) * 100 ) : 0; // SUMMARY document .getElementById( 'medRate' ) .innerHTML= ` <div style=" font-size:32px; font-weight:800; color:#1E6FDB; "> ${percent}% </div> <div> Medication Reported Taken </div> <div style=" margin-top:10px; line-height:1.9; "> ✓ Taken: ${taken.length} <br> ✕ Not Taken: ${missed.length} <br> ○ Not Recorded: ${missing.length} </div> `; let alerts=''; // MISSED if( missed.length ){ alerts+= ` <div class="alert"> <strong> ⚠ Medication Missed </strong> <br><br> These dates indicate medication was marked <strong> No </strong> during check-in. <br><br> ${missed .map( d=> new Date( d.timestamp ) .toLocaleDateString() ) .join("<br>")} </div> `; } // NOT RECORDED if( missing.length ){ alerts+= ` <div style=" background:#fff8dd; padding:16px; border-radius:14px; margin-top:14px; "> <strong> Medication Not Recorded </strong> <br><br> ${missing .map( d=> new Date( d.timestamp ) .toLocaleDateString() ) .join("<br>")} </div> `; } // SUCCESS if( !alerts ){ alerts= ` <div style=" background:#ecfff0; padding:16px; border-radius:14px; "> ✓ Medication tracked for all days </div> `; } document .getElementById( 'medAlerts' ) .innerHTML= alerts; }




// SCHEDULE

function renderSchedule(){

document

.getElementById(
'schedule'
)

.innerText=

userGlobal.dayForCall

?

`${userGlobal.dayForCall}
 •
 ${userGlobal.timeForCall}
 •
 ${userGlobal.timezone}`

:

'Not configured';

}

// CHART

function renderChart(){

new Chart(

document
.getElementById(
'chart'
),

{

type:'line',

data:{

labels:

dataGlobal.map(
d=>

new Date(
d.timestamp
)

.toLocaleDateString()
),

datasets:[{

label:'Mood',

data:

dataGlobal.map(
d=>

d.mood==="Great"
?3
:

d.mood==="Okay"
?2
:1
)

}]

}

}

);

}

function goHome(){

window.location=
'/home';

}

function logout(){

fetch('/logout')

.then(()=>{

window.location=
'/login';

});

}

</script>

</body>

</html>
