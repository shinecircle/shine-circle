<!DOCTYPE html>
<html>
<head>
  <title>Family Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="header">
  <img src="logo.jpg" class="logo">
  <div>
    <button class="btn" onclick="logout()">Logout</button>
  </div>
</div>

<div style="padding:20px;text-align:center;">

  <h2 id="dashboardTitle">Dashboard</h2>
  <p id="lovedOne"></p>

  <hr>

  <h3>Mood Check-ins</h3>
  <div id="checkins"></div>

  <hr>

  <h3>Medications</h3>
  <div id="meds"></div>

</div>

<script>

// LOAD DATA
function load(){

  fetch('/family-data')
  .then(r=>r.json())
  .then(data=>{

    // =========================
    // HEADER NAMES
    // =========================
    fetch('/auth')
    .then(r=>r.json())
    .then(user=>{
      if(user && user.firstName){
        document.getElementById("dashboardTitle").innerText =
          user.firstName + "'s Dashboard";
      }
    });

    if(data.user){
      const name = data.user.nickname || data.user.firstName || "User";
      document.getElementById("lovedOne").innerText =
        "Loved One: " + name;
    }

    // =========================
    // MOOD
    // =========================
    const c = document.getElementById("checkins");
    c.innerHTML = "";

    data.checkins.forEach(x=>{
      const div = document.createElement("div");

      const time = new Date(x.timestamp)
        .toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});

      div.innerText = `${x.mood} at ${time}`;
      c.appendChild(div);
    });

    // =========================
    // MEDS
    // =========================
    const m = document.getElementById("meds");
    m.innerHTML = "";

    data.meds.forEach(x=>{

      const div = document.createElement("div");

      const time = new Date(x.timestamp)
        .toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});

      div.innerText = `${x.medicineName} ✔ at ${time}`;
      m.appendChild(div);

    });

  });
}

function logout(){
  fetch('/logout').then(()=> window.location='login.html');
}

load();

</script>

</body>
</html>
