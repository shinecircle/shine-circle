<!DOCTYPE html>
<html>
<head>
  <title>Family Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">

  <!-- CHART LIBRARY -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="header">
  <img src="logo.jpg" class="logo">
  <button class="btn" onclick="logout()">Logout</button>
</div>

<div style="padding:20px;text-align:center;">

  <h2 id="dashboardTitle">Dashboard</h2>
  <p id="lovedOne"></p>

  <canvas id="chart" height="120"></canvas>

  <hr>

  <h3>Recent Activity</h3>
  <div id="activity"></div>

</div>

<script>

function load(){

  fetch('/family-data')
  .then(r=>r.json())
  .then(data=>{

    // =========================
    // HEADER
    // =========================
    fetch('/auth')
    .then(r=>r.json())
    .then(user=>{
      if(user && user.firstName){
        document.getElementById("dashboardTitle").innerText =
          user.firstName + "'s Dashboard";
      }
    });

    if(data.user){
      const name = data.user.nickname || data.user.firstName || "User";
      document.getElementById("lovedOne").innerText =
        "Loved One: " + name;
    }

    // =========================
    // LAST 7 DAYS
    // =========================
    const days = [];
    const moodData = [];
    const medsData = [];

    for(let i=6;i>=0;i--){
      const d = new Date();
      d.setDate(d.getDate()-i);

      const label = d.toLocaleDateString('en-US',{weekday:'short'});
      days.push(label);

      const dayStr = d.toDateString();

      // mood
      const moodEntry = data.checkins.find(x =>
        new Date(x.timestamp).toDateString() === dayStr
      );

      const moodMap = {
        "Great":4,
        "Good":3,
        "Low":2,
        "Struggling":1
      };

      moodData.push(moodEntry ? moodMap[moodEntry.mood] : null);

      // meds (taken or not)
      const medEntry = data.meds.find(x =>
        new Date(x.timestamp).toDateString() === dayStr
      );

      medsData.push(medEntry ? 1 : 0);
    }

    // =========================
    // CHART
    // =========================
    new Chart(document.getElementById('chart'), {
      type: 'line',
      data: {
        labels: days,
        datasets: [
          {
            label: 'Mood',
            data: moodData,
            tension: 0.3
          },
          {
            label: 'Medication Taken',
            data: medsData,
            tension: 0.3
          }
        ]
      },
      options: {
        scales: {
          y: {
            beginAtZero:true,
            ticks: {
              callback: function(value){
                return ["","Struggling","Low","Good","Great"][value] || "";
              }
            }
          }
        }
      }
    });

    // =========================
    // ACTIVITY LIST
    // =========================
    const activity = document.getElementById("activity");
    activity.innerHTML = "";

    data.checkins.slice(0,5).forEach(x=>{
      const div = document.createElement("div");
      div.innerText =
        `${x.mood} (${new Date(x.timestamp).toLocaleString()})`;
      activity.appendChild(div);
    });

  });
}

function logout(){
  fetch('/logout').then(()=> window.location='login.html');
}

load();

</script>

</body>
</html>
