<!DOCTYPE html>
<html>

<head>

<title>Home | Shine Circle</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="styles.css">

<style>

.page{
max-width:900px;
margin:auto;
padding:20px;
text-align:center;
}

.welcome{
font-size:34px;
margin-top:10px;
}

.date{
font-size:18px;
margin-bottom:25px;
color:#555;
}

.grid{

display:grid;

grid-template-columns:
1fr 1fr;

gap:18px;

margin-top:20px;

}

.card{

background:white;

border-radius:18px;

padding:28px;

min-height:150px;

display:flex;

flex-direction:column;

justify-content:center;

box-shadow:
0 4px 12px
rgba(0,0,0,.08);

}

.big-btn{

padding:18px;

font-size:22px;

cursor:pointer;

}

.call-link{

cursor:pointer;

text-decoration:none;

color:inherit;

}

.call-title{

font-size:18px;

font-weight:bold;

margin-bottom:10px;

}

.call-date{

font-size:22px;

}

.call-sub{

margin-top:12px;

color:#666;

}

@media(max-width:700px){

.grid{

grid-template-columns:
1fr;

}

}

</style>

</head>

<body>

<div id="header"></div>

<div class="page">

<h1
class="welcome"
id="welcome">

Loading...

</h1>

<div
class="date"
id="todayDate">

</div>

<div class="grid">

<!-- TOP LEFT -->

<div class="card">

<button
class="btn big-btn"
onclick="goCheckin()">

Check In

</button>

</div>

<!-- TOP RIGHT -->

<div class="card">

<div
id="statusMessage"
style="
font-size:24px;
line-height:1.5;
">

Loading...

</div>

</div>

<!-- BOTTOM LEFT -->

<div class="card">

<button
class="btn btn-light big-btn"
onclick="goActivities()">

Activities

</button>

</div>

<!-- BOTTOM RIGHT -->

<div
class="card call-link"
onclick="goCall()">

<div class="call-title">

Upcoming Call

</div>

<div
class="call-date"
id="nextCall">

No upcoming call

</div>

<div class="call-sub">

Click for details

</div>

</div>

</div>

</div>

<script>

let currentUser=null;

let nextCallData=null;

// HEADER
fetch('/header')

.then(r=>r.text())

.then(html=>{

document
.getElementById("header")
.innerHTML=html;

const buttons=
document.getElementById(
"headerButtons"
);

if(buttons){

buttons.innerHTML=`

<button
class="btn"
onclick="logout()">

Logout

</button>

`;

}

});

// AUTH
fetch('/auth')

.then(r=>r.json())

.then(user=>{

if(!user){

window.location=
'/login';

return;

}

currentUser=user;

document
.getElementById(
'welcome'
)

.innerText=

"We are glad you are here, " +

(
user.firstname ||
user.username
);

loadDate();

loadStatus();

loadNextCall();

});

// DATE
function loadDate(){

const date=

new Date()

.toLocaleDateString(

'en-US',

{

weekday:'long',

month:'long',

day:'numeric',

year:'numeric'

}

);

document
.getElementById(
'todayDate'
)

.innerText=

"Today is " +
date;

}

// STATUS
function loadStatus(){

fetch(
'/api/checkin-today'
)

.then(r=>r.json())

.then(data=>{

const mood=

!!data.mood;

const meds=

data.meds==="Yes";

let msg="";

if(
!mood &&
!meds
){

msg=

"Today will be a good day!";

}

else if(
mood &&
!meds
){

msg=

"Please make sure you are taking your medication";

}

else if(
!mood &&
meds
){

msg=

"We care about how you feel";

}

else{

msg=

"Thanks for checking in today";

}

document
.getElementById(
'statusMessage'
)

.innerText=

msg;

});

}

// CALL
function loadNextCall(){

fetch(
'/api/next-call'
)

.then(r=>r.json())

.then(call=>{

nextCallData=
call;

if(
!call ||
!call.calldate
){

return;

}

document
.getElementById(
'nextCall'
)

.innerHTML=

`

<div>

${call.calldate}

</div>

<div>

${call.starttime}

</div>

`;

});

}

function goCall(){

if(
nextCallData
){

window.location=

'/activities';

}

}

function goCheckin(){

window.location=

'/checkin';

}

function goActivities(){

window.location=

'/activities';

}

function logout(){

fetch(
'/logout'
)

.then(()=>{

window.location=
'/login';

});

}

</script>

</body>

</html>
