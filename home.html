
<!DOCTYPE html>
<html>

<head>

<title>Home | Shine Circle</title>

<meta
name="viewport"
content="width=device-width, initial-scale=1">

<link
rel="stylesheet"
href="styles.css">

<style>

body{
margin:0;
background:#f4f4f4;
font-family:Arial;
}

.page{
max-width:1100px;
margin:auto;
padding:20px;
}

.today{
text-align:center;
font-size:22px;
margin-top:30px;
margin-bottom:35px;
}

.section{
background:#cfe6f0;
border-radius:32px;
padding:26px;
margin-bottom:30px;
border:2px solid #b7bcc1;
}

.section-title{
font-size:24px;
font-weight:bold;
margin-bottom:20px;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
align-items:center;
}

.action{
display:flex;
justify-content:center;
}

.big-button{
width:320px;
height:95px;
font-size:22px;
border-radius:20px;
}

.right-panel{
text-align:center;
font-size:22px;
line-height:2;
}

.call-title{
font-size:20px;
margin-bottom:10px;
}

.call-link{
cursor:pointer;
}

@media(max-width:800px){

.row{
grid-template-columns:1fr;
}

.big-button{
width:100%;
}

}

</style>

</head>

<body>

<div id="header"></div>

<div class="page">

<div
class="today"
id="todayDate">

Loading...

</div>

<!-- CHECK IN -->

<div class="section">

<div class="section-title">

Your well-being matters

</div>

<div class="row">

<div class="action">

<button
class="btn big-button"
onclick="goCheckin()">

Daily check-in
<br>
is not complete

</button>

</div>

<div
class="right-panel"
id="statusPanel">

Loading...

</div>

</div>

</div>

<!-- ACTIVITIES -->

<div class="section">

<div class="section-title">

Moments of activity make a difference

</div>

<div class="row">

<div class="action">

<button
class="btn big-button"
onclick="goActivities()">

Activities

</button>

</div>

<div
class="right-panel call-link"
onclick="goCall()">

<div class="call-title">

Your next upcoming call

</div>

<div
id="callDate">

No upcoming call

</div>

</div>

</div>

</div>

</div>

<script>

let nextCall=null;

// HEADER

fetch('/header')

.then(r=>r.text())

.then(html=>{

document
.getElementById(
'header'
)

.innerHTML=

html;

const buttons=

document
.getElementById(
'headerButtons'
);

if(buttons){

buttons.innerHTML=

`

<button
class="btn"
onclick="goSettings()">

Settings

</button>

<button
class="btn"
onclick="logout()">

Logout

</button>

`;

}

});

// DATE

document
.getElementById(
'todayDate'
)

.innerText=

"Today is " +

new Date()

.toLocaleDateString(

'en-US',

{

weekday:'long',
month:'long',
day:'numeric',
year:'numeric'

}

);

// STATUS

fetch('/api/checkin-today')

.then(r=>r.json())

.then(data=>{

const mood=
!!data.mood;

const meds=
data.meds==="Yes";

let text="";

if(
!mood &&
!meds
){

text=

`
Mood not reported today
<br>
Medicine not recorded today
`;

}

else if(
mood &&
!meds
){

text=

`
✓ Mood reported today
<br>
Medicine consumption not reported today
`;

}

else if(
!mood &&
meds
){

text=

`
✓ Medicine recorded today
<br>
Mood not reported today
`;

}

else{

text=

`
✓ Mood reported today
<br>
✓ Medicine recorded today
`;

}

document
.getElementById(
'statusPanel'
)

.innerHTML=

text;

});

// CALL

fetch('/api/next-call')

.then(r=>r.json())

.then(data=>{

nextCall=data;

if(
!data ||
!data.calldate
){

return;

}

const formattedDate=

new Date(
data.calldate
)

.toLocaleDateString(

'en-US',

{

month:'long',
day:'numeric',
year:'numeric'

}

);

let formattedTime="";

if(
data.starttime
){

const parts=

data.starttime
.split(":");

const t=

new Date();

t.setHours(parts[0]);

t.setMinutes(parts[1]);

formattedTime=

t.toLocaleTimeString(

'en-US',

{

hour:'numeric',
minute:'2-digit',
hour12:true

}

);

}

document
.getElementById(
'callDate'
)

.innerHTML=

`

<div>

${formattedDate}

</div>

<div>

${formattedTime}

</div>

`;

});

// NAV

function goCheckin(){

window.location=
'/checkin';

}

function goActivities(){

window.location=
'/activities';

}

function goCall(){

window.location=
'/activities';

}

function goSettings(){

window.location=
'/settings';

}

function logout(){

fetch('/logout')

.then(()=>{

window.location=
'/login';

});

}

</script>

</body>

</html>
