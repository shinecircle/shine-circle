<!DOCTYPE html>
<html>
<head>
  <title>Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">

  <style>
    .alert {
      margin: 10px auto;
      padding: 12px;
      max-width: 400px;
      border-radius: 8px;
      font-weight: bold;
    }

    .alert-warning {
      background: #fff3cd;
      color: #856404;
    }

    .alert-good {
      background: #d4edda;
      color: #155724;
    }
  </style>
</head>

<body>

<div class="header">
  <img src="logo.jpg" class="logo">
  <div>
    <button class="btn" onclick="logout()">Logout</button>
  </div>
</div>

<div style="text-align:center;padding:20px;">

  <h2>Welcome</h2>

  <!-- STATUS ALERTS -->
  <div id="alerts"></div>

  <br>

  <button class="btn btn-primary" onclick="goCheckin()">Daily Check-In</button>
  <button class="btn" onclick="goActivities()">Activities</button>

</div>

<script>

// =========================
// LOAD STATUS
// =========================
fetch('/today-status')
.then(r=>r.json())
.then(data=>{

  const alerts = document.getElementById("alerts");

  // CHECK-IN ALERT
  if(!data.moodToday){
    const div = document.createElement("div");
    div.className = "alert alert-warning";
    div.innerText = "⚠️ No check-in yet today";
    alerts.appendChild(div);
  } else {
    const div = document.createElement("div");
    div.className = "alert alert-good";
    div.innerText = "✔ Check-in completed today";
    alerts.appendChild(div);
  }

  // MED ALERT
  if(!data.medToday){
    const div = document.createElement("div");
    div.className = "alert alert-warning";
    div.innerText = "⚠️ Medication not logged today";
    alerts.appendChild(div);
  } else {
    const div = document.createElement("div");
    div.className = "alert alert-good";
    div.innerText = "✔ Medication taken today";
    alerts.appendChild(div);
  }

});

// =========================
// NAV
// =========================
function goCheckin(){ window.location='checkin.html'; }
function goActivities(){ window.location='activities.html'; }
function logout(){ fetch('/logout').then(()=>window.location='login.html'); }

</script>

</body>
</html>
