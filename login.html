<!DOCTYPE html>

<html>
<head>
  <title>SHINE Circle</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles.css">

  <style>

    body {
      text-align:center;
      padding:20px;
    }

    .hero {
      max-width:600px;
      margin:auto;
    }

    .big-btn {
      font-size:20px;
      padding:18px;
      width:90%;
      margin:15px 0;
      border-radius:10px;
      border:none;
      background:#1E6FDB;
      color:white;
      cursor:pointer;
    }

    .card {
      margin-top:20px;
      padding:15px;
      background:#f5f5f5;
      border-radius:10px;
    }

    input {
      width:90%;
      padding:12px;
      margin:5px 0;
      border-radius:6px;
      border:1px solid #ccc;
    }

  </style>

</head>

<body>

<!-- REUSABLE HEADER -->

<div id="header"></div>

<div class="hero">

  <h2>SHINE Circle</h2>

  <p>
    <b>A bright spot you can count on.</b>
  </p>

  <p>
    Daily check-ins, real human connection,
    and peace of mind for families.
  </p>

  <button class="big-btn" onclick="showLogin()">
    Login to Continue
  </button>

  <div id="loginBox" class="card" style="display:none;">

```
<input id="username" placeholder="Username"><br>

<input
  id="password"
  type="password"
  placeholder="Password"
><br>

<button class="btn" onclick="login()">
  Login
</button>

<p id="error" style="color:red;"></p>
```

  </div>

</div>

<script>

// =========================
// LOAD HEADER
// =========================
fetch('/header')
.then(r=>r.text())
.then(html=>{

  document.getElementById('header').innerHTML = html;

  document.getElementById("headerButtons").innerHTML = `
    <button class="btn btn-light" onclick="goHome()">
      Home
    </button>
  `;
});

// =========================
// SHOW LOGIN
// =========================
function showLogin(){

  document.getElementById("loginBox")
    .style.display = "block";

}

// =========================
// LOGIN
// =========================
function login(){

  fetch('/login',{

    method:'POST',

    headers:{
      'Content-Type':'application/json'
    },

    body: JSON.stringify({

      username:
        document.getElementById("username").value,

      password:
        document.getElementById("password").value

    })

  })

  .then(r=>r.json())

  .then(data=>{

    if(!data.success){

      document.getElementById("error")
        .innerText = "Login failed";

      return;

    }

    sessionStorage.setItem(
      "justLoggedIn",
      "true"
    );

    if(data.role === 'user'){

      window.location = '/home';

    }

    else{

      window.location = '/family';

    }

  });

}

// =========================
// NAV
// =========================
function goHome(){

  window.location = '/';

}

</script>

</body>
</html>
