
<!DOCTYPE html>
<html>

<head>

<title>SHINE Circle</title>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<link
rel="stylesheet"
href="styles.css">

<style>

body{
text-align:center;
padding:20px;
}

.hero{
max-width:600px;
margin:auto;
}

.big-btn{
font-size:20px;
padding:18px;
width:90%;
margin:15px 0;
border-radius:10px;
border:none;
background:#1E6FDB;
color:white;
cursor:pointer;
}

.card{
margin-top:20px;
padding:20px;
background:#f5f5f5;
border-radius:12px;
}

input{
width:90%;
padding:12px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

.login-title{
margin-bottom:18px;
}

#error{
margin-top:14px;
font-weight:bold;
}

</style>

</head>

<body>

<div id="header"></div>

<div class="hero">

<h2>

Brighter days start here

</h2>

<p>

Daily check-ins,
real human connection,
and peace of mind for families.

</p>

<button
class="big-btn"
onclick="showLogin()">

Login to Continue

</button>

<div
id="loginBox"
class="card"
style="display:none;">

<h3 class="login-title">

Login

</h3>

<input
id="username"
placeholder="Username">

<input
id="password"
type="password"
placeholder="Password"
onkeypress="handleEnter(event)">

<br><br>

<button
class="btn"
onclick="login()">

Login

</button>

<p
id="error"
style="color:red;">

</p>

</div>

</div>

<script>

// HEADER

fetch('/header')

.then(r=>r.text())

.then(html=>{

document
.getElementById(
'header'
)

.innerHTML=

html;

const buttons=

document
.getElementById(
'headerButtons'
);

if(buttons){

buttons.innerHTML=

`

<button
class="btn btn-light"
onclick="goHome()">

Home

</button>

<button
class="btn"
onclick="window.location='/create-account'">

Create Account

</button>

`;

}

});

// SHOW LOGIN

function showLogin(){

document
.getElementById(
'loginBox'
)

.style.display=

'block';

document
.getElementById(
'username'
)

.focus();

}

// ENTER

function handleEnter(event){

if(
event.key==="Enter"
){

login();

}

}

// LOGIN

function login(){

const username=

document
.getElementById(
'username'
)

.value
.trim();

const password=

document
.getElementById(
'password'
)

.value;

fetch(

'/login',

{

method:'POST',

headers:{
'Content-Type':
'application/json'
},

body:

JSON.stringify({

username,
password

})

}

)

.then(
r=>r.json()
)

.then(data=>{

if(
!data.success
){

document
.getElementById(
'error'
)

.innerText=

"Invalid username or password";

return;

}

sessionStorage.setItem(
'justLoggedIn',
'true'
);

const role=

(
data.role ||
''
)

.toLowerCase()

.trim();

// ADMIN

if(
role==='admin'
){

window.location.href=
'/admin';

}

// FAMILY

else if(

role==='family'

||

role==='caregiver'

){

window.location.href=
'/family';

}

// USER

else{

window.location.href=
'/home';

}

})

.catch(()=>{

document
.getElementById(
'error'
)

.innerText=

"Server error. Please try again.";

});

}

function goHome(){

window.location.href=
'/';

}

</script>


</body>

</html>
