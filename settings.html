<!DOCTYPE html>
<html>

<head>

<title>Settings | Shine Circle</title>

<meta
name="viewport"
content="width=device-width, initial-scale=1">

<link
rel="stylesheet"
href="styles.css">

<style>

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:26px;
border-radius:18px;
margin-bottom:24px;
box-shadow:0 4px 12px rgba(0,0,0,.06);
}

h2{
text-align:center;
margin-bottom:30px;
}

.label{
font-weight:700;
margin-top:16px;
}

.value{
margin-top:8px;
padding:14px;
background:#f5f7fb;
border-radius:12px;
}

.btn-group{
display:flex;
gap:12px;
flex-wrap:wrap;
margin-top:18px;
}

.day-btn,
.time-btn{

padding:14px 18px;

border:none;

border-radius:14px;

background:#eef3ff;

cursor:pointer;

font-size:16px;

}

.selected{

background:#1E6FDB;

color:white;

}

select{

padding:14px;

border-radius:12px;

width:240px;

margin-top:12px;

border:1px solid #ddd;

}

#msg{

margin-top:20px;

font-weight:700;

text-align:center;

}

</style>

</head>

<body>

<div id="header"></div>

<div class="container">

<h2>
Settings
</h2>

<div class="card">

<h3>
User Information
</h3>

<div class="label">
First Name
</div>

<div
class="value"
id="firstName">

Loading...

</div>

<div class="label">
Phone Number
</div>

<div
class="value"
id="phone">

Loading...

</div>

</div>

<div class="card">

<h3>
Preferred Days for Calls
</h3>

<div class="btn-group">

<button class="day-btn">Mon</button>
<button class="day-btn">Tue</button>
<button class="day-btn">Wed</button>
<button class="day-btn">Thu</button>
<button class="day-btn">Fri</button>
<button class="day-btn">Sat</button>
<button class="day-btn">Sun</button>

</div>

<h3 style="margin-top:30px;">
Preferred Time
</h3>

<div class="btn-group">

<button class="time-btn">
Morning
</button>

<button class="time-btn">
Midday
</button>

<button class="time-btn">
Evening
</button>

</div>

<h3 style="margin-top:30px;">
Time Zone
</h3>

<select id="timezone">

<option value="EST">
Eastern
</option>

<option value="CST">
Central
</option>

<option value="MST">
Mountain
</option>

<option value="PST">
Pacific
</option>

</select>

<div style="margin-top:30px;">

<button
id="saveBtn"
class="btn">

Save Settings

</button>

</div>

<div id="msg"></div>

</div>

</div>

<script>

// ======================
// HEADER
// ======================

fetch('/header')

.then(
r=>r.text()
)

.then(html=>{

document
.getElementById(
'header'
)

.innerHTML=

html;

const buttons=

document
.getElementById(
'headerButtons'
);

if(buttons){

buttons.innerHTML=

`

<button
class="btn"
onclick="goHome()">

Home

</button>

<button
class="btn"
onclick="goActivities()">

Activities

</button>

<button
class="btn"
onclick="goCheckin()">

Checkin

</button>

`;

}

});

// ======================
// LOAD USER INFO
// ======================

fetch('/auth')

.then(
r=>r.json()
)

.then(user=>{

if(!user)
return;

document
.getElementById(
'firstName'
)

.innerText=

user.firstname ||

'Not set';

document
.getElementById(
'phone'
)

.innerText=

user.phone ||

'Not available';

});

// ======================
// LOAD SETTINGS
// ======================

fetch('/api/activities')

.then(
r=>r.json()
)

.then(data=>{

if(!data)
return;

if(data.dayforcall){

const days=

data.dayforcall

.split(',')

.map(
d=>d.trim()
);

document

.querySelectorAll(
'.day-btn'
)

.forEach(btn=>{

if(
days.includes(
btn.innerText
)
){

btn.classList.add(
'selected'
);

}

});

}

if(
data.timeforcall
){

document

.querySelectorAll(
'.time-btn'
)

.forEach(btn=>{

if(
btn.innerText
===

data.timeforcall
){

btn.classList.add(
'selected'
);

}

});

}

if(
data.timezone
){

document
.getElementById(
'timezone'
)

.value=

data.timezone;

}

});

// ======================
// DAY SELECT
// ======================

document

.querySelectorAll(
'.day-btn'
)

.forEach(btn=>{

btn.addEventListener(
'click',
()=>{

btn.classList.toggle(
'selected'
);

});

});

// ======================
// TIME SELECT
// ======================

document

.querySelectorAll(
'.time-btn'
)

.forEach(btn=>{

btn.addEventListener(
'click',
()=>{

document

.querySelectorAll(
'.time-btn'
)

.forEach(
b=>

b.classList.remove(
'selected'
)

);

btn.classList.add(
'selected'
);

});

});

// ======================
// SAVE
// ======================

document

.getElementById(
'saveBtn'
)

.addEventListener(
'click',
saveSettings
);

function saveSettings(){

const dayForCall=

Array

.from(

document

.querySelectorAll(
'.day-btn.selected'
)

)

.map(
b=>

b.innerText

)

.join(',');

const selectedTime=

document

.querySelector(
'.time-btn.selected'
)

?.innerText ||

'';

const timezone=

document

.getElementById(
'timezone'
)

.value;

fetch(

'/api/activities',

{

method:'POST',

headers:{

'Content-Type':

'application/json'

},

body:

JSON.stringify({

dayForCall,

timeForCall:

selectedTime,

timezone

})

}

)

.then(
r=>r.json()
)

.then(data=>{

document

.getElementById(
'msg'
)

.innerText=

data.success

?

'✓ Settings Saved'

:

'Save failed';

})

.catch(()=>{

document

.getElementById(
'msg'
)

.innerText=

'Unable to save';

});

}

// ======================
// NAVIGATION
// ======================

function goHome(){

window.location=
'/home';

}

function goActivities(){

window.location=
'/activities';

}

function goCheckin(){

window.location=
'/checkin';

}

</script>

</body>

</html>
